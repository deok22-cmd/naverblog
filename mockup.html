<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px;
        }

        .card {
            width: 540px;
            height: 540px;
            position: relative;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .p1 {
            background: #00796B;
            color: white;
        }

        .p1 img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }

        .p1 .content {
            position: relative;
            padding: 40px;
        }

        .p1 h2 {
            font-size: 50px;
            margin: 0;
            font-weight: 800;
        }

        .p2 {
            padding: 40px;
        }

        .p2 h2 {
            color: #d32f2f;
            margin: 0;
        }

        .p2 img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            margin-top: 20px;
            border-radius: 10px;
        }

        .p4 {
            padding: 40px;
        }

        .p4 img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="card p1">
        <img src="images/260410/9_tent_1.png">
        <div class="content">
            <p style="font-size: 20px; opacity: 0.7;">COODY AIR TENT CARE</p>
            <h2>쿠디 감성 100점,<br>세탁은 몇 점?</h2>
        </div>
    </div>

    <div class="card p2">
        <h2>무겁고, 크고, 막막하고...</h2>
        <p>수십 킬로의 에어텐트, 직접 하실 건가요?</p>
        <img src="images/260410/9_tent_2.png">
    </div>

    <div class="card p4">
        <h2>투명한 단가표</h2>
        <img src="images/260410/9_coody_price_1.jpg">
    </div>
</body>

</html>
