<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 리스트 (3포인트) ===== point1 역할 — 포토스팟 BEST 3 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">포토스팟 BEST 3</text>
  <rect x="82" y="284" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="452" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="520" font-size="46" font-weight="700" fill="#ffffff">언덕 정상부 전망 포인트</text>
    <text x="80" y="574" font-size="30" font-weight="500" fill="#b2dfdb">진입 직후 · 밭 전체+산 능선+하늘 한 프레임</text>
    <line x1="80" y1="636" x2="1000" y2="636" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="700" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="768" font-size="46" font-weight="700" fill="#ffffff">밭 한가운데 오솔길</text>
    <text x="80" y="822" font-size="30" font-weight="500" fill="#b2dfdb">가슴 높이 꽃 · 인물 클로즈업 · 터널 효과</text>
    <line x1="80" y1="884" x2="1000" y2="884" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="948" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1016" font-size="46" font-weight="700" fill="#ffffff">소나무 숲 경계 지점</text>
    <text x="80" y="1070" font-size="30" font-weight="500" fill="#b2dfdb">붉은 꽃 × 초록 솔잎 · 오후 역광 최고</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8d6">오전 역광 피하고 오솔길은 이른 아침에.</text>
</svg>
