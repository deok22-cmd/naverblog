<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== C : 측면 텍스트 (why) — 6월 호국보훈의 달 소개 ===== -->
  <defs>
    <linearGradient id="scrimLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.74"/>
      <stop offset="0.52" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimLeft)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="430" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="700" fill="#80cbc4" letter-spacing="3">6월의 이유</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="540">호국보훈의</tspan>
    <tspan x="80" y="630">달</tspan>
  </text>

  <rect x="82" y="688" width="120" height="8" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="500" fill="#e0f2f1">
    <text x="80" y="790">나라를 위해 희생하신 분들을</text>
    <text x="80" y="848">기억하고 감사드리는 6월.</text>
    <text x="80" y="940">6월 6일(토) 오전 10시, 전국</text>
    <text x="80" y="998">1분 묵념이 함께합니다.</text>
    <text x="80" y="1090">입장 무료 · 지하철로 연결되는</text>
    <text x="80" y="1148">서울의 두 추모 공간을 소개합니다.</text>
  </g>
</svg>
