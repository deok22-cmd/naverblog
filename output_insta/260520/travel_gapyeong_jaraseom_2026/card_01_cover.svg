<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_01 : G0 Cover — 가평 자라섬 꽃 페스타 2026 ===== -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.40" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.80"/>
    </linearGradient>
    <linearGradient id="scrimTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="0.26" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2620"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimTop)"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>

  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <g id="badge">
    <rect x="80" y="84" width="270" height="64" rx="32" fill="#00796b"/>
    <text x="215" y="126" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="29" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">GAPYEONG · 자라섬</text>
  </g>

  <g id="title">
    <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="112" font-weight="800" fill="#ffffff" letter-spacing="-3">
      <tspan x="80" y="980">꽃밭 10만㎡</tspan>
      <tspan x="80" y="1108">입장료 환급</tspan>
    </text>
    <text x="80" y="1188" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="42" font-weight="600" fill="#e0f2f1">가평 자라섬 꽃 페스타 2026 완전정복</text>
  </g>

  <text x="80" y="1278" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8d6">밀어서 포토스팟·코스 보기  →</text>
</svg>
