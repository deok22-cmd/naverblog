<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== C : 측면 텍스트 (사진중심 · 좌측 방향 그라데만) — point-4 역할 =====
       파주 DMZ 코스 추천 (반나절 / 하루 코스) -->
  <defs>
    <linearGradient id="scrimLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.74"/>
      <stop offset="0.52" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimLeft)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="410" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="700" fill="#80cbc4" letter-spacing="3">추천 코스</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="520">반나절 혹은</tspan>
    <tspan x="80" y="610">하루 코스</tspan>
  </text>

  <rect x="82" y="668" width="120" height="8" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="500" fill="#e0f2f1">
    <text x="80" y="762">반나절: 평화누리공원 → 자유의 다리</text>
    <text x="80" y="810">→ 망배단 → 임진각 전시 → 곤돌라</text>
    <text x="80" y="900">하루: 반나절 코스 +</text>
    <text x="80" y="948">오두산 통일전망대(차 약 20분)</text>
    <text x="80" y="1038">+ 헤이리 예술마을 또는</text>
    <text x="80" y="1086">프로방스 파주마을로 마무리</text>
  </g>
</svg>
