<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== E : 하단 텍스트 (사진 최대 · 하단 스크림만) — point-2 역할 =====
       DMZ 평화곤돌라 안내 -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.52" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.80"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="1050" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="700" fill="#80cbc4" letter-spacing="3">DMZ 평화곤돌라</text>
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="1148">임진강 위를 날며</tspan>
    <tspan x="80" y="1228">분단 현장을 눈앞에</tspan>
  </text>
  <text x="80" y="1298" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="500" fill="#e0f2f1">주말 대기 줄이길 원하면 오전 일찍 탑승 또는 온라인 사전 예약 활용</text>
</svg>
