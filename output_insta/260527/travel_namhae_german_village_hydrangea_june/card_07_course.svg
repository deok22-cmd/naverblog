<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 — course 카드 (남해 당일 연계 코스 5단계) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">남해 당일 코스</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="422" font-size="42" font-weight="700" fill="#ffffff">독일마을 수국 산책</text>
    <text x="80" y="464" font-size="28" font-weight="500" fill="#b2dfdb">이른 아침 인파 적고 빛 좋은 골든타임</text>
    <text x="1000" y="438" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">오전 8~10시</text>
    <line x1="80" y1="510" x2="1000" y2="510" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="578" font-size="42" font-weight="700" fill="#ffffff">물건방조어부림 산책</text>
    <text x="80" y="620" font-size="28" font-weight="500" fill="#b2dfdb">천연기념물 제150호 — 그늘 숲길 체력 보충</text>
    <text x="1000" y="594" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">오전 10~11시</text>
    <line x1="80" y1="666" x2="1000" y2="666" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="734" font-size="42" font-weight="700" fill="#ffffff">다랭이마을</text>
    <text x="80" y="776" font-size="28" font-weight="500" fill="#b2dfdb">108개 계단식 논밭 — 독일마을에서 차로 약 25분</text>
    <text x="1000" y="750" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">11시~오후 1시</text>
    <line x1="80" y1="822" x2="1000" y2="822" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="890" font-size="42" font-weight="700" fill="#ffffff">상주 은모래비치</text>
    <text x="80" y="932" font-size="28" font-weight="500" fill="#b2dfdb">백사장·소나무 그늘 — 산책 중심으로</text>
    <text x="1000" y="906" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">오후 1~3시</text>
    <line x1="80" y1="978" x2="1000" y2="978" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1046" font-size="42" font-weight="700" fill="#ffffff">미조항 노을 감상</text>
    <text x="1000" y="1046" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">오후 5시 이후</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 코스 상세는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
