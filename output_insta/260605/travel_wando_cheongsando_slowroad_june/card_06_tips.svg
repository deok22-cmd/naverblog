<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P3 : 체크리스트 (사진중심 · 스크림 워시 · 박스/보더 없음) =====
       tips 역할 — 청산도 여행 준비 체크리스트 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">이것만 챙기면 실패 없음</text>
  <rect x="82" y="258" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="338" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="414" font-size="42" font-weight="600" fill="#ffffff">여객선 막배 시간 미리 확인</text>
    <text x="80" y="462" font-size="30" font-weight="500" fill="#b2dfdb">기상 악화 시 결항 가능 — 일정에 여유 필수</text>
    <line x1="80" y1="506" x2="1000" y2="506" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="554" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="630" font-size="42" font-weight="600" fill="#ffffff">얇은 겉옷 · 자외선 차단제 · 모자</text>
    <text x="80" y="678" font-size="30" font-weight="500" fill="#b2dfdb">서울보다 3~5℃ 낮음 · 저녁 바닷바람 쌀쌀</text>
    <line x1="80" y1="722" x2="1000" y2="722" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="770" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="846" font-size="42" font-weight="600" fill="#ffffff">완도에서 물·간식 미리 준비</text>
    <text x="80" y="894" font-size="30" font-weight="500" fill="#b2dfdb">섬 내 편의점 품목 제한 — 사전 준비 권장</text>
    <line x1="80" y1="938" x2="1000" y2="938" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="986" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1062" font-size="42" font-weight="600" fill="#ffffff">지도 앱 오프라인 저장</text>
    <text x="80" y="1110" font-size="30" font-weight="500" fill="#b2dfdb">슬로길 표지판 따라가되 앱 미리 다운로드</text>
  </g>

  <text x="80" y="1196" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#80cbc4">저장해두고 그대로 따라가세요  ↓</text>
  <text x="80" y="1268" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 가이드는 프로필 블로그에서 확인.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) =====
       'travelkorea_365' = 핸들 상수. fill만 카테고리 dark 팔레트로 치환, 좌표·구조 불변. -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
