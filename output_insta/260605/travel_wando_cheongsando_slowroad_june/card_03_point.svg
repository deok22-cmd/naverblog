<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 3포인트 리스트 (사진중심 · 스크림 워시 · 박스 없음) =====
       point 역할 — 슬로길 3대 매력 포인트 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.70"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#80cbc4" letter-spacing="3">슬로길 · 42.195km</text>
  <text x="80" y="308" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">청산도 슬로길</text>
  <text x="80" y="390" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">3가지 핵심</text>
  <rect x="82" y="428" width="120" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 포인트 1 -->
    <rect x="80" y="498" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="574" font-size="46" font-weight="700" fill="#ffffff">11코스 전체 42.195km</text>
    <text x="80" y="628" font-size="34" font-weight="500" fill="#b2dfdb">아시아 최초 슬로시티 — 2007년 지정</text>
    <line x1="80" y1="672" x2="1000" y2="672" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2"/>

    <!-- 포인트 2 -->
    <rect x="80" y="720" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="796" font-size="46" font-weight="700" fill="#ffffff">서편제 촬영지 · 코스 1 포함</text>
    <text x="80" y="850" font-size="34" font-weight="500" fill="#b2dfdb">당리 마을 굽이진 언덕길, 1993년 임권택 감독</text>
    <line x1="80" y1="894" x2="1000" y2="894" stroke="#ffffff" stroke-opacity="0.13" stroke-width="2"/>

    <!-- 포인트 3 -->
    <rect x="80" y="942" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1018" font-size="46" font-weight="700" fill="#ffffff">6월 안개 — 몽환 풍경의 절정</text>
    <text x="80" y="1072" font-size="34" font-weight="500" fill="#b2dfdb">이른 아침 바다 물안개가 섬을 신비롭게 감쌈</text>
  </g>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) =====
       'travelkorea_365' = 핸들 상수. fill만 카테고리 dark 팔레트로 치환, 좌표·구조 불변. -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
