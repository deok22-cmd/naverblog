<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 (사진중심 · 스크림 워시 · 노드/스파인 다이어그램 없음) =====
       course 역할 — 슬로길 코스 1~3 단계 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">추천 코스 동선</text>
  <rect x="82" y="254" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="392" font-size="42" font-weight="700" fill="#ffffff">코스 1 서편제길</text>
    <text x="80" y="438" font-size="28" font-weight="500" fill="#b2dfdb">도청항 출발 · 당리 마을 · 구들장 논 · 원점 회귀</text>
    <text x="1000" y="408" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">5.3km</text>
    <line x1="80" y1="490" x2="1000" y2="490" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="562" font-size="42" font-weight="700" fill="#ffffff">코스 2 봄의 왈츠길</text>
    <text x="80" y="608" font-size="28" font-weight="500" fill="#b2dfdb">바다 전망 · 돌담길 · 코스 1 연결 추천</text>
    <text x="1000" y="578" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">3.2km</text>
    <line x1="80" y1="660" x2="1000" y2="660" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="732" font-size="42" font-weight="700" fill="#ffffff">코스 3 고인돌길</text>
    <text x="80" y="778" font-size="28" font-weight="500" fill="#b2dfdb">선사시대 지석묘 200여 기 · 바다 전망 조합</text>
    <text x="1000" y="748" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">4.0km</text>
    <line x1="80" y1="830" x2="1000" y2="830" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="900" font-size="42" font-weight="700" fill="#ffffff">일출 포인트 범바위</text>
    <text x="80" y="946" font-size="28" font-weight="500" fill="#b2dfdb">동쪽 해안 절벽 · 오전 5시 20~30분 일출</text>
    <text x="1000" y="916" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">+30~40분</text>
    <line x1="80" y1="998" x2="1000" y2="998" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1068" font-size="42" font-weight="700" fill="#ffffff">당일 탐방 실질 시간</text>
    <text x="1000" y="1068" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">약 5~6시간</text>
  </g>

  <text x="80" y="1186" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 코스는 프로필 블로그에서 확인하세요.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) =====
       'travelkorea_365' = 핸들 상수. fill만 카테고리 dark 팔레트로 치환, 좌표·구조 불변. -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
