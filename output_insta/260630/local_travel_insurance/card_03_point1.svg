<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== B : 상단 텍스트 — point1 : 핵심 보장 항목 5가지 ===== -->
  <defs>
    <linearGradient id="scrimTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.66"/>
      <stop offset="0.36" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.78" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimTop)"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="150" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#80cbc4" letter-spacing="3">반드시 확인할 것</text>
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="86" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="270">핵심 보장</tspan>
    <tspan x="80" y="372">5가지 항목</tspan>
  </text>
  <text x="80" y="452" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e0f2f1">이 5가지가 없으면 가입 전 다시 확인하세요.</text>

  <!-- 5가지 항목 리스트 -->
  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="570" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="624" font-size="40" font-weight="600" fill="#ffffff">해외 의료비(상해·질병) — 최소 1억 원 이상</text>
    <rect x="80" y="666" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="720" font-size="40" font-weight="600" fill="#ffffff">긴급 이송·후송 — 미포함 상품 주의</text>
    <rect x="80" y="762" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="816" font-size="40" font-weight="600" fill="#ffffff">항공기 지연·수하물 분실 보상</text>
    <rect x="80" y="858" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="912" font-size="40" font-weight="600" fill="#ffffff">배상책임 — 레저 활동 시 필수</text>
    <rect x="80" y="954" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="1008" font-size="40" font-weight="600" fill="#ffffff">사망·후유장애 기본 보장</text>
  </g>

  <text x="80" y="1290" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="600" fill="#e0f2f1">미국·캐나다는 의료비 한도 2~3억 원 권장.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
