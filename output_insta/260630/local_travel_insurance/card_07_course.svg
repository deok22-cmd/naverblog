<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 — course : 현지 병원 이용 및 보험금 청구 절차 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">보험금 청구 절차</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- Step 1 -->
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">병원 방문 전</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#b2dfdb">보험사 24시간 해외 지원 센터에 먼저 연락</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 1</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- Step 2 -->
    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">현지 비용 결제 시</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#b2dfdb">영수증·진단서·처방전 원본 반드시 보관</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 2</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- Step 3 -->
    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">귀국 후 청구</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#b2dfdb">보험사 앱·홈페이지·고객센터로 서류 제출</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 3</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 청구 기한 안내 -->
    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">청구 기한</text>
    <text x="1000" y="952" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">보통 3년 이내</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">서류 클라우드 백업으로 분실 위험 방지 권장.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
