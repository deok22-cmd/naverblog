<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 3포인트 리스트 — point 카드 (고수동굴 3가지 핵심 사실) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">고수동굴 핵심 3가지</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 포인트 1 -->
    <rect x="80" y="430" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="510" font-size="52" font-weight="800" fill="#ffffff">천연기념물 제256호</text>
    <text x="80" y="572" font-size="36" font-weight="500" fill="#b2dfdb">총 1,300m 중 700m 관람 개방, 약 40~50분 소요</text>
    <line x1="80" y1="620" x2="1000" y2="620" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 포인트 2 -->
    <rect x="80" y="660" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="740" font-size="52" font-weight="800" fill="#ffffff">연중 14~16°C</text>
    <text x="80" y="800" font-size="36" font-weight="500" fill="#b2dfdb">여름 피서지로 최적 — 얇은 겉옷 필수</text>
    <line x1="80" y1="848" x2="1000" y2="848" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 포인트 3 -->
    <rect x="80" y="888" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="968" font-size="52" font-weight="800" fill="#ffffff">입장료 어른 5,000원 내외</text>
    <text x="80" y="1028" font-size="36" font-weight="500" fill="#b2dfdb">오전 9시~오후 5시 운영 (매표 오후 4시 30분 마감)</text>
  </g>

  <text x="80" y="1150" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="600" fill="#80cbc4">저장해두고 방문 전 확인하세요  ↓</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
