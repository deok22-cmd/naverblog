<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 3포인트 리스트 — 주요 가옥 3채 (h2 02) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">꼭 들러야 할 가옥 3채</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="430" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="500" font-size="42" font-weight="700" fill="#ffffff">향단 (보물 제412호)</text>
    <text x="80" y="556" font-size="32" font-weight="500" fill="#b2dfdb">이언적이 어머니 위해 지은 99칸 대가옥</text>
    <line x1="80" y1="610" x2="1000" y2="610" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="660" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="730" font-size="42" font-weight="700" fill="#ffffff">관가정 (보물 제442호)</text>
    <text x="80" y="786" font-size="32" font-weight="500" fill="#b2dfdb">언덕 위 전망 최고 — 마을 전체가 내려다보임</text>
    <line x1="80" y1="840" x2="1000" y2="840" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="890" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="960" font-size="42" font-weight="700" fill="#ffffff">무첨당 (보물 제411호)</text>
    <text x="80" y="1016" font-size="32" font-weight="500" fill="#b2dfdb">수백 년 느티나무 그늘 — 조선 사대부 건축 전형</text>
  </g>

  <text x="80" y="1150" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#80cbc4">국가민속문화재 지정 54채 보유  →</text>
  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 가이드는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
