<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_04 : F (텍스트 3포인트 · point1) — 수상레저 3종 — travel_cheongpungho_water_leisure_june -->
  <!-- F = 정확히 3개 병렬 포인트 레이아웃 (원고: 수상스키·바나나보트·카약) -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">청풍호 수상레저 3종</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 포인트 1 -->
    <rect x="80" y="420" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="492" font-size="56" font-weight="800" fill="#ffffff">수상스키 · 웨이크보드</text>
    <text x="80" y="550" font-size="34" font-weight="500" fill="#b2dfdb">30분 강습 후 입문 가능 · 체험 약 40~50분</text>
    <line x1="80" y1="606" x2="1000" y2="606" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 포인트 2 -->
    <rect x="80" y="650" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="722" font-size="56" font-weight="800" fill="#ffffff">바나나보트 · 땅콩보트</text>
    <text x="80" y="780" font-size="34" font-weight="500" fill="#b2dfdb">강습 없이 바로 탑승 · 유아도 가능(구명조끼)</text>
    <line x1="80" y1="836" x2="1000" y2="836" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 포인트 3 -->
    <rect x="80" y="880" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="952" font-size="56" font-weight="800" fill="#ffffff">수상 카약 · 파워보트</text>
    <text x="80" y="1010" font-size="34" font-weight="500" fill="#b2dfdb">호수 파노라마를 즐기는 조용한 레저</text>
  </g>

  <text x="80" y="1140" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="700" fill="#80cbc4">바나나보트 1만 원 내외 · 수상스키 2~3만 원 내외</text>
  <text x="80" y="1248" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">정확한 요금·운영 업체는 방문 전 현장 확인 요망</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
