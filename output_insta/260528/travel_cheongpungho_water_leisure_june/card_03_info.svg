<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_03 : P1 (정보 표 · info) — travel_cheongpungho_water_leisure_june -->
  <!-- P1 = label↔value 5행 표. 원고 info-table 5행 사용 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">청풍호 기본 정보</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 행 1: 위치 -->
    <text x="80" y="430" font-size="30" font-weight="600" fill="#b2dfdb">위치</text>
    <text x="80" y="490" font-size="48" font-weight="800" fill="#ffffff">충청북도 제천시 청풍면 일대</text>
    <line x1="80" y1="536" x2="1000" y2="536" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 행 2: 면적 -->
    <text x="80" y="606" font-size="30" font-weight="600" fill="#b2dfdb">면적</text>
    <text x="80" y="666" font-size="56" font-weight="800" fill="#ffffff">약 67.5㎢ (여의도 약 23배)</text>
    <line x1="80" y1="720" x2="1000" y2="720" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 행 3: 고도 -->
    <text x="80" y="792" font-size="30" font-weight="600" fill="#b2dfdb">수면 고도</text>
    <text x="80" y="852" font-size="56" font-weight="800" fill="#ffffff">해발 약 145m</text>
    <line x1="80" y1="906" x2="1000" y2="906" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 행 4: 레저 시즌 -->
    <text x="80" y="978" font-size="30" font-weight="600" fill="#b2dfdb">레저 시즌</text>
    <text x="80" y="1038" font-size="56" font-weight="800" fill="#ffffff">매년 6월 초 ~ 9월 말</text>
    <line x1="80" y1="1092" x2="1000" y2="1092" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 행 5: 주차 -->
    <text x="80" y="1164" font-size="30" font-weight="600" fill="#b2dfdb">주차</text>
    <text x="80" y="1224" font-size="46" font-weight="800" fill="#ffffff">청풍문화재단지 주차장 유료 이용</text>
  </g>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
