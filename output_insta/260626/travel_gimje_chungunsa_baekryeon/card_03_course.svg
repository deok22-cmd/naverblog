<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_03_course · F_text_list · h2-04 산책 코스 — 아래→위 3단계 동선 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">산책 코스 3단계</text>
  <rect x="82" y="284" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="452" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="520" font-size="46" font-weight="700" fill="#ffffff">아래 연못 — 수면 가득 백련</text>
    <text x="80" y="574" font-size="30" font-weight="500" fill="#b2dfdb">넓은 하단 연못, 연잎 사이 하얀 꽃이 점점이</text>
    <line x1="80" y1="636" x2="1000" y2="636" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="700" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="768" font-size="46" font-weight="700" fill="#ffffff">중간 둑길 — 꽃과 코 앞에서</text>
    <text x="80" y="822" font-size="30" font-weight="500" fill="#b2dfdb">좁은 둑길 위 백련, 연꽃 향기가 은은하게</text>
    <line x1="80" y1="884" x2="1000" y2="884" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="948" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1016" font-size="46" font-weight="700" fill="#ffffff">위 연못 — 꽉 찬 밀도감</text>
    <text x="80" y="1070" font-size="30" font-weight="500" fill="#b2dfdb">규모 작고 밀도 높아, 내려다보는 앵글이 압권</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8d6">천천히 둘러보면 1~2시간, 사진에 집중하면 반나절도 부족.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
