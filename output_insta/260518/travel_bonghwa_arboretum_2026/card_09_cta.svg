<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== G9 : CTA 마무리 (고정 아키타입) =====
       저장 유도 + 블로그 안내 -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.32" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.86"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#15201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <!-- 북마크 아이콘 (저장 유도) -->
  <path id="bookmark" d="M912 84 h78 a10 10 0 0 1 10 10 v150 l-49 -33 -49 33 v-150 a10 10 0 0 1 10 -10 z" fill="#00796b"/>

  <g id="cta-title">
    <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="104" font-weight="800" fill="#ffffff" letter-spacing="-2">
      <tspan x="80" y="900">캡처해 두고</tspan>
      <tspan x="80" y="1020">주말에 떠나요</tspan>
    </text>
  </g>

  <g id="info-chip">
    <rect x="80" y="1070" width="700" height="70" rx="35" fill="#ffffff" fill-opacity="0.14" stroke="#00796b" stroke-width="2"/>
    <text x="110" y="1115" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="600" fill="#ffffff">경북 봉화군 춘양면 춘양로 1501</text>
  </g>

  <text x="80" y="1198" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="600" fill="#80cbc4">전체 코스·팁 가이드는 프로필 블로그에서  →</text>

  <text x="80" y="1262" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="500" fill="#9e9e9e">#백두대간수목원  #봉화여행  #스카이워크  #호랑이숲  #6월여행지</text>
</svg>
