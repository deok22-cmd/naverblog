  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="1010" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="700" fill="#80cbc4" letter-spacing="3">왜 6월의 양재인가</text>
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="1100">도심 속 23만㎡</tspan>
    <tspan x="80" y="1186">초록 별천지</tspan>
  </text>
  <text x="80" y="1252" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="500" fill="#e0f2f1">6월 중순 메타세콰이어 신록이 절정, 장마 전 마지막 산책 시즌</text>
