<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 — 동선·코스 (봄밤 3~4시간 버전 5단계) =====
       원고 tip-box 코스 요약 그대로 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">봄밤 추천 코스 동선</text>
  <rect x="82" y="254" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="392" font-size="42" font-weight="700" fill="#ffffff">동호 남쪽 덱 — 타워 반영 뷰</text>
    <text x="80" y="438" font-size="28" font-weight="500" fill="#b2dfdb">석촌호수역 도착 직후</text>
    <text x="1000" y="408" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">30분</text>
    <line x1="80" y1="490" x2="1000" y2="490" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="562" font-size="42" font-weight="700" fill="#ffffff">서호 수변길 산책</text>
    <text x="80" y="608" font-size="28" font-weight="500" fill="#b2dfdb">수양버들·생태 습지 구간</text>
    <text x="1000" y="578" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">30분</text>
    <line x1="80" y1="660" x2="1000" y2="660" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="732" font-size="42" font-weight="700" fill="#ffffff">동호 북쪽 통과</text>
    <text x="80" y="778" font-size="28" font-weight="500" fill="#b2dfdb">롯데백화점 방향 통로</text>
    <text x="1000" y="748" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">20분</text>
    <line x1="80" y1="830" x2="1000" y2="830" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="902" font-size="42" font-weight="700" fill="#ffffff">송리단길 카페 탐방</text>
    <text x="80" y="948" font-size="28" font-weight="500" fill="#b2dfdb">레이크뷰·메인 골목·시크릿 카페</text>
    <text x="1000" y="918" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">60분</text>
    <line x1="80" y1="1000" x2="1000" y2="1000" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1072" font-size="42" font-weight="700" fill="#ffffff">야식 또는 디저트</text>
    <text x="80" y="1118" font-size="28" font-weight="500" fill="#b2dfdb">골목 간식·독립 카페 디저트</text>
    <text x="1000" y="1088" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">30분</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 가이드는 프로필 블로그에서.</text>
</svg>
