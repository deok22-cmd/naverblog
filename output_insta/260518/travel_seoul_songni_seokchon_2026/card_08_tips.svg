<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P3 : 체크리스트 — 꿀팁 (tip-box + 방문 팁 4항목) =====
       title=이것만 알면 실패 없음, 4항목, save, footer -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">이것만 알면 실패 없음</text>
  <rect x="82" y="254" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="380" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="450" font-size="42" font-weight="600" fill="#ffffff">오후 6시 30분~7시 도착이 황금 타이밍</text>
    <line x1="80" y1="510" x2="1000" y2="510" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="560" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="630" font-size="42" font-weight="600" fill="#ffffff">대중교통 이용 — 주차는 만차 · 고비용</text>
    <line x1="80" y1="690" x2="1000" y2="690" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="740" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="810" font-size="42" font-weight="600" fill="#ffffff">사진 명당: 평일 오후 9시 이후가 조용</text>
    <line x1="80" y1="870" x2="1000" y2="870" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="920" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="990" font-size="42" font-weight="600" fill="#ffffff">얇은 겉옷 필수 — 호수 바람 체감 2~3도 ↓</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#80cbc4">저장해두고 그대로 따라가세요  ↓</text>
  <text x="80" y="1200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 가이드는 프로필 블로그에서.</text>
</svg>
