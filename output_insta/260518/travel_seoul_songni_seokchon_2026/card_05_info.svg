<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 — 정보 한눈에 (info-table 7행 → 6행 표시) =====
       title=방문 전 기본 정보, 6행, footer -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">방문 전 기본 정보</text>
  <rect x="82" y="254" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="380" font-size="40" font-weight="600" fill="#ffffff">지하철</text>
    <text x="1000" y="380" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">8호선 석촌호수역 1·2번 출구</text>
    <line x1="80" y1="418" x2="1000" y2="418" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="502" font-size="40" font-weight="600" fill="#ffffff">추천 시간</text>
    <text x="1000" y="502" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">오후 6시~10시</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="624" font-size="40" font-weight="600" fill="#ffffff">소요 시간</text>
    <text x="1000" y="624" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">총 3~4시간</text>
    <line x1="80" y1="662" x2="1000" y2="662" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="746" font-size="40" font-weight="600" fill="#ffffff">입장료</text>
    <text x="1000" y="746" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">석촌호수 무료 개방</text>
    <line x1="80" y1="784" x2="1000" y2="784" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="868" font-size="40" font-weight="600" fill="#ffffff">최적 시기</text>
    <text x="1000" y="868" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">4~6월 (기온 15~22도)</text>
    <line x1="80" y1="906" x2="1000" y2="906" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="990" font-size="40" font-weight="600" fill="#ffffff">주차</text>
    <text x="1000" y="990" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">대중교통 강력 권장</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">서울 송파구 석촌호수로 일대 · 2026년 기준.</text>
</svg>
