<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== C : 측면 텍스트 (사진중심 · 좌측 방향 그라데만, 불투명 패널 없음) ===== -->
  <defs>
    <linearGradient id="scrimLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.74"/>
      <stop offset="0.52" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimLeft)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="430" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="700" fill="#80cbc4" letter-spacing="3">전국 최다 수준</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="540">50여 종이</tspan>
    <tspan x="80" y="630">한 공원에</tspan>
  </text>

  <rect x="82" y="688" width="120" height="8" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="35" font-weight="500" fill="#e0f2f1">
    <text x="80" y="788">보통 공원은 10~20종인데,</text>
    <text x="80" y="846">함평은 일·유럽·미국 개량종에</text>
    <text x="80" y="904">자생종까지 함께 전시합니다.</text>
    <text x="80" y="962">토양 pH 따라 색이 바뀌어,</text>
    <text x="80" y="1020">보라·파랑·흰·분홍을 한자리에서.</text>
  </g>
</svg>
