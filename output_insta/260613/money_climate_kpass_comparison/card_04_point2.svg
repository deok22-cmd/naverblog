<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== A : 헤드라인-하단 — point2 (K-패스 핵심) ===== -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.40" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a0d"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <rect x="80" y="820" width="64" height="10" fill="#388e3c"/>
  <text x="80" y="940" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="86" font-weight="800" fill="#ffffff" letter-spacing="-2">K-패스 환급형</text>

  <g id="chips">
    <rect x="80" y="990" width="310" height="74" rx="37" fill="#388e3c"/>
    <text x="235" y="1038" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="700" fill="#ffffff" text-anchor="middle">일반 20% 환급</text>
    <rect x="408" y="990" width="310" height="74" rx="37" fill="#388e3c"/>
    <text x="563" y="1038" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="700" fill="#ffffff" text-anchor="middle">청년 30% 환급</text>
  </g>

  <text x="80" y="1162" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e8f5e9">서울·수도권·지방 전국 대중교통 적용,</text>
  <text x="80" y="1214" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e8f5e9">신분당선·GTX도 환급 대상에 포함됩니다.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
