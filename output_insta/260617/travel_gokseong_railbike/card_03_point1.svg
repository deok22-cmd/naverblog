<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_03 : point1 (A — 헤드라인 하단) — travel_gokseong_railbike / 260617
       소스: h2_02 레일바이크 요금과 운행 시간표
       카테고리: 국내여행 / 팔레트: #00796b / #004d40 / #e0f2f1 -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.40" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="80" y="852" width="64" height="10" fill="#00796b"/>
  <text x="80" y="958" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-2">레일바이크</text>
  <text x="80" y="1050" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-2">요금 정리</text>

  <g id="chips">
    <rect x="80" y="1098" width="310" height="74" rx="37" fill="#00796b"/>
    <text x="235" y="1146" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">2인 2만원</text>
    <rect x="410" y="1098" width="310" height="74" rx="37" fill="#00796b"/>
    <text x="565" y="1146" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">4인 3만원</text>
  </g>

  <text x="80" y="1232" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="500" fill="#e0f2f1">구 곡성역→가정역 약 5.7km,</text>
  <text x="80" y="1284" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="500" fill="#e0f2f1">하루 7회(10~17시) · 사전 예약 필수</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
