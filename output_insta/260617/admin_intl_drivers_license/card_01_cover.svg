<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_01 : 커버 (G0) — admin_intl_drivers_license =====
       카테고리: 생활·정보 / 팔레트: #388e3c / #1b5e20 / #e8f5e9 -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.30" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="scrimTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="0.25" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1e10"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimTop)"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <!-- 상단 채널명 -->
  <text x="80" y="110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#a5d6a7" letter-spacing="3">생활정보</text>

  <!-- 커버 헤드라인 -->
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="100" font-weight="800" fill="#ffffff" letter-spacing="-3">
    <tspan x="80" y="950">국제면허증</tspan>
    <tspan x="80" y="1064">당일발급</tspan>
  </text>

  <!-- 서브 타이틀 -->
  <text x="80" y="1138" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="44" font-weight="500" fill="#a5d6a7">방문·온라인·인정 국가 133개 총정리</text>

  <!-- 강조 틱 -->
  <rect x="80" y="876" width="80" height="10" fill="#388e3c"/>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
