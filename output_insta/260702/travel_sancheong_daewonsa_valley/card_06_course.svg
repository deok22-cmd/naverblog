<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_06_course · P3 : 체크리스트 (저장 유도) · 방문 전 확인 사항 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">출발 전 이것만 확인</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="430" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="500" font-size="40" font-weight="600" fill="#ffffff">물놀이 허용 구역 최신 정보 확인</text>
    <line x1="80" y1="555" x2="1000" y2="555" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="604" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="674" font-size="40" font-weight="600" fill="#ffffff">기상청 날씨 예보 확인 (장마철 급류)</text>
    <line x1="80" y1="729" x2="1000" y2="729" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="778" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="848" font-size="40" font-weight="600" fill="#ffffff">아쿠아슈즈·구명조끼 준비 (어린이 필수)</text>
    <line x1="80" y1="903" x2="1000" y2="903" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="952" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1022" font-size="40" font-weight="600" fill="#ffffff">성수기 주차 조기 마감 대비 — 일찍 출발</text>
  </g>

  <text x="80" y="1132" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="800" fill="#80cbc4">저장해두고 가세요  ↓</text>
  <text x="80" y="1222" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 이용 가이드는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
