<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_06_course · P2 (코스 단계) · 여름 당일치기 추천 동선 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#060a10"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">여름밤 추천 동선</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="430" font-size="42" font-weight="700" fill="#ffffff">출발 (대구·안동 기준)</text>
    <text x="80" y="476" font-size="28" font-weight="500" fill="#b2dfdb">약 2~2.5시간 소요 (수도권 4시간+)</text>
    <text x="1000" y="446" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">05:30</text>
    <line x1="80" y1="528" x2="1000" y2="528" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="600" font-size="42" font-weight="700" fill="#ffffff">수비계곡 물놀이</text>
    <text x="80" y="646" font-size="28" font-weight="500" fill="#b2dfdb">지정 물놀이 구역, 가족 단위 안전</text>
    <text x="1000" y="616" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">11:00</text>
    <line x1="80" y1="698" x2="1000" y2="698" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="770" font-size="42" font-weight="700" fill="#ffffff">숙박 체크인</text>
    <text x="80" y="816" font-size="28" font-weight="500" fill="#b2dfdb">수비면 민박 또는 영양 읍내 (1박 권장)</text>
    <text x="1000" y="786" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">17:00</text>
    <line x1="80" y1="868" x2="1000" y2="868" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="940" font-size="42" font-weight="700" fill="#ffffff">반딧불이천문대 이동</text>
    <text x="80" y="986" font-size="28" font-weight="500" fill="#b2dfdb">또는 수비면 개활지</text>
    <text x="1000" y="956" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">21:00</text>
    <line x1="80" y1="1038" x2="1000" y2="1038" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1110" font-size="42" font-weight="700" fill="#ffffff">별 관측 시작</text>
    <text x="1000" y="1110" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">21:30</text>
  </g>

  <text x="80" y="1228" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">달 없는 날 기준 은하수 가장 선명 · 전체 코스는 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
