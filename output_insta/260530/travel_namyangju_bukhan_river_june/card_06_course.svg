<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 (course 카드 — 팔당~청평 하루 코스) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">하루 드라이브 코스</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">팔당대교 북단</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#b2dfdb">물안개 감상 포인트</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">새벽 5시~</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">두물머리(양수리)</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#b2dfdb">느티나무·연꽃밭·산책로</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">오전</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">운길산역 카페 구간</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#b2dfdb">북한강뷰 카페 · 수종사 트레킹(약 40분)</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">오전~점심</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">조안면·청평 방면</text>
    <text x="80" y="998" font-size="28" font-weight="500" fill="#b2dfdb">수상레저·청평호 수변 산책로</text>
    <text x="1000" y="968" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">오후</text>
    <line x1="80" y1="1050" x2="1000" y2="1050" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1122" font-size="42" font-weight="700" fill="#ffffff">총 소요</text>
    <text x="1000" y="1122" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">약 5~7시간</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 코스 상세는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
