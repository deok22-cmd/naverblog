<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== C : 측면 텍스트 (why 역할) — 카테고리: 생활정보 #1565c0/#0d47a1 =====
       원고 intro-box 요약: 공항에서 뺏기는 이유·규정 미리 알면 해결
       kicker, headline 2줄, body 3줄 -->
  <defs>
    <linearGradient id="scrimLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.74"/>
      <stop offset="0.52" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0a1a2e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimLeft)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#0d47a1"/>

  <text x="80" y="430" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="700" fill="#64b5f6" letter-spacing="3">왜 중요한가</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="540">공항에서</tspan>
    <tspan x="80" y="630">뺏기는 이유</tspan>
  </text>

  <rect x="82" y="688" width="120" height="8" fill="#1565c0"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="500" fill="#e3f2fd">
    <text x="80" y="790">규정을 몰라 공항에서 버리는 일이</text>
    <text x="80" y="848">반복됩니다. 포장만 제대로 해도</text>
    <text x="80" y="906">모두 가지고 탈 수 있습니다.</text>
  </g>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#0d47a1"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
