<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 리스트 (point3 역할) — 카테고리: 생활정보 #1565c0/#0d47a1 =====
       원고 h2 08 "위탁 수하물 초과 요금과 절약 방법" — 절약 3가지
       title, item1~3 (제목+보조) -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0a1a2e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#0d47a1"/>

  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">초과 요금 절약법</text>
  <rect x="82" y="284" width="140" height="9" fill="#1565c0"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="452" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="520" font-size="46" font-weight="700" fill="#ffffff">온라인 사전 추가 구매</text>
    <text x="80" y="574" font-size="30" font-weight="500" fill="#90caf9">현장 요금의 30~70% 수준으로 저렴</text>
    <line x1="80" y1="636" x2="1000" y2="636" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="700" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="768" font-size="46" font-weight="700" fill="#ffffff">무게 분산</text>
    <text x="80" y="822" font-size="30" font-weight="500" fill="#90caf9">책·신발·노트북은 기내 반입 가방으로</text>
    <line x1="80" y1="884" x2="1000" y2="884" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="948" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="1016" font-size="46" font-weight="700" fill="#ffffff">면세점 구매 축소</text>
    <text x="80" y="1070" font-size="30" font-weight="500" fill="#90caf9">귀국 짐 증가 감안, 배송 서비스 활용</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8dc">국내선 초과 kg당 약 4,000~8,000원 / 국제선은 더 비쌈.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#0d47a1"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
