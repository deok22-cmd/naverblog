<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_07 : tips — P3_checklist =====
       h2-09: 예약 전 체크리스트 4가지 (① 취소약관 ② 카드결제 ③ 확인전화 ④ 여행자보험)
       카테고리: 생활정보 / 팔레트: #1565c0 / #0d47a1 / accent #64b5f6 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a2e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#0d47a1"/>

  <!-- 제목 -->
  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="58" font-weight="800" fill="#ffffff">예약 전 체크리스트</text>
  <rect x="82" y="304" width="140" height="9" fill="#1565c0"/>

  <!-- 4항목 체크리스트 -->
  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="430" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="500" font-size="42" font-weight="600" fill="#ffffff">취소·환불 약관 반드시 확인</text>
    <line x1="80" y1="560" x2="1000" y2="560" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="610" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="680" font-size="42" font-weight="600" fill="#ffffff">카드 결제 선택 (차지백 대비)</text>
    <line x1="80" y1="740" x2="1000" y2="740" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="790" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="860" font-size="42" font-weight="600" fill="#ffffff">예약 후 전화로 조건 재확인</text>
    <line x1="80" y1="920" x2="1000" y2="920" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="970" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="1040" font-size="42" font-weight="600" fill="#ffffff">국내 여행자보험 가입 검토</text>
  </g>

  <!-- 저장 유도 -->
  <text x="80" y="1150" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#64b5f6">저장해두고 예약 전에 체크하세요  ↓</text>
  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#90caf9">전체 가이드는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#0d47a1"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
