<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_06 : point2 — F_text_list =====
       h2-05: 플랫폼별 환불 정책 — 야놀자 / 여기어때 / 에어비앤비 (정확히 3포인트)
       카테고리: 생활정보 / 팔레트: #1565c0 / #0d47a1 / accent #64b5f6 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a2e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#0d47a1"/>

  <!-- 제목 -->
  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">플랫폼별 환불 차이</text>
  <rect x="82" y="284" width="140" height="9" fill="#1565c0"/>

  <!-- 3포인트 리스트 -->
  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="452" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="520" font-size="46" font-weight="700" fill="#ffffff">야놀자</text>
    <text x="80" y="574" font-size="30" font-weight="500" fill="#90caf9">취소 보호 서비스 별도 구매 시 환불 가능 경우 있음</text>
    <line x1="80" y1="636" x2="1000" y2="636" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="700" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="768" font-size="46" font-weight="700" fill="#ffffff">여기어때</text>
    <text x="80" y="822" font-size="30" font-weight="500" fill="#90caf9">취소 불가·부분·전액 환불 상품 분리 운영</text>
    <line x1="80" y1="884" x2="1000" y2="884" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="948" width="34" height="8" fill="#64b5f6"/>
    <text x="80" y="1016" font-size="46" font-weight="700" fill="#ffffff">에어비앤비</text>
    <text x="80" y="1070" font-size="30" font-weight="500" fill="#90caf9">유연·보통·엄격 중 호스트 설정 취소 정책 적용</text>
  </g>

  <!-- 맥락 -->
  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8dc">OTA 예약 시 플랫폼 고객센터 중재도 활용 가능.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#0d47a1"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
