<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_04 : point1 — D_center_statement =====
       h2-06: 숙소 귀책 사유 취소 시 환불 권리 — 단일 핵심 메시지
       카테고리: 생활정보 / 팔레트: #1565c0 / #0d47a1 / accent #64b5f6 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.60"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a2e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#0d47a1"/>

  <!-- 라벨 -->
  <text x="540" y="470" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="700" fill="#64b5f6" text-anchor="middle" letter-spacing="3">숙소 귀책 취소</text>

  <!-- 중앙 핵심 문장 -->
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="88" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    <tspan x="540" y="640">숙소가 먼저</tspan>
    <tspan x="540" y="752">취소했다면</tspan>
    <tspan x="540" y="864" fill="#64b5f6">전액 + 배상</tspan>
  </text>

  <!-- 구분선 -->
  <rect x="490" y="918" width="100" height="6" fill="#1565c0"/>

  <!-- 보조 설명 -->
  <text x="540" y="1010" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="500" fill="#e3f2fd" text-anchor="middle">예약금 전액 환불 + 추가 배상 청구 가능.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#0d47a1"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
