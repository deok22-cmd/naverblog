<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_05 : info — P1_facts_table =====
       h2-02 info-table: 공정위 소비자분쟁해결기준 취소 위약금 6행
       카테고리: 생활정보 / 팔레트: #1565c0 / #0d47a1 / accent #64b5f6 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a2e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#0d47a1"/>

  <!-- 제목 -->
  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="56" font-weight="800" fill="#ffffff">공정위 환불 기준표</text>
  <rect x="82" y="234" width="140" height="9" fill="#1565c0"/>

  <!-- 표 6행 -->
  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="360" font-size="36" font-weight="600" fill="#ffffff">10일 이전 취소</text>
    <text x="1000" y="360" font-size="36" font-weight="800" fill="#64b5f6" text-anchor="end">계약금 전액 환불</text>
    <line x1="80" y1="396" x2="1000" y2="396" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="484" font-size="36" font-weight="600" fill="#ffffff">7일 이전 취소</text>
    <text x="1000" y="484" font-size="36" font-weight="800" fill="#64b5f6" text-anchor="end">계약금 전액 환불</text>
    <line x1="80" y1="520" x2="1000" y2="520" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="608" font-size="36" font-weight="600" fill="#ffffff">4일 이전 취소</text>
    <text x="1000" y="608" font-size="36" font-weight="800" fill="#64b5f6" text-anchor="end">전액 또는 50% 공제</text>
    <line x1="80" y1="644" x2="1000" y2="644" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="732" font-size="36" font-weight="600" fill="#ffffff">3일 이전 취소</text>
    <text x="1000" y="732" font-size="36" font-weight="800" fill="#64b5f6" text-anchor="end">50% 공제 후 환불</text>
    <line x1="80" y1="768" x2="1000" y2="768" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="856" font-size="36" font-weight="600" fill="#ffffff">1일 이전 취소</text>
    <text x="1000" y="856" font-size="36" font-weight="800" fill="#64b5f6" text-anchor="end">80% 공제 또는 전액 위약금</text>
    <line x1="80" y1="892" x2="1000" y2="892" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="980" font-size="36" font-weight="600" fill="#ffffff">당일 취소·노쇼</text>
    <text x="1000" y="980" font-size="36" font-weight="800" fill="#64b5f6" text-anchor="end">계약금 전액 위약금</text>
  </g>

  <!-- 푸터 주석 -->
  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="500" fill="#90caf9">공정거래위원회 소비자분쟁해결기준 기준 · 숙소 약관에 따라 상이.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#0d47a1"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
