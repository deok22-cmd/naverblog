<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== G0 COVER : 수해·침수 피해 재난지원금 / gov_flood_relief =====
       카테고리: 생활·정보(행정) — 팔레트 primary:#4527a0 dark:#1a0072 light:#ede7f6 -->
  <defs>
    <linearGradient id="scrimCover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.28"/>
      <stop offset="0.48" stop-color="#000000" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.86"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d0a1f"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimCover)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#1a0072"/>

  <!-- 상단 채널 키커 -->
  <text x="80" y="130" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#b39ddb" letter-spacing="3">행정 셀프가이드</text>

  <!-- 메인 타이틀 (h1 압축 · 훅형) -->
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="106" font-weight="800" fill="#ffffff" letter-spacing="-3">
    <tspan x="80" y="680">수해 피해,</tspan>
    <tspan x="80" y="800">지금 바로</tspan>
    <tspan x="80" y="920">신청하세요</tspan>
  </text>

  <!-- 구분선 -->
  <rect x="80" y="968" width="160" height="8" fill="#4527a0"/>

  <!-- 인트로 훅 1줄 -->
  <text x="80" y="1060" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="42" font-weight="500" fill="#ede7f6">재난지원금·풍수해보험 한눈에 정리</text>

  <!-- 서브 키워드 칩 -->
  <text x="80" y="1150" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="600" fill="#b39ddb">행정안전부 기준 · 2026년 장마철</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1a0072"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
