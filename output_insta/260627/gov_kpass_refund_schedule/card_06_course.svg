<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 — COURSE 카드 (K-패스 앱 환급금 확인 4단계) =====
       gov_kpass_refund_schedule / 2026-06-27
       원고 step-box 4개: 앱로그인 → 지급내역 메뉴 → 월별내역 확인 → 카드사앱 교차확인 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">앱에서 확인하는 법</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">앱 실행 후 로그인</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#b2dfdb">K-패스 공식 앱 — 본인 계정으로 로그인</text>
    <text x="1000" y="458" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 1</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">'지급내역' 메뉴 선택</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#b2dfdb">메인 화면 → 지급내역 또는 환급내역 탭</text>
    <text x="1000" y="628" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 2</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">월별 환급 내역 확인</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#b2dfdb">이용 횟수·환급율·지급 예정일 확인</text>
    <text x="1000" y="798" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 3</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">카드사 앱 교차 확인</text>
    <text x="80" y="998" font-size="28" font-weight="500" fill="#b2dfdb">실제 입금·차감 여부는 카드사 앱 별도 확인</text>
    <text x="1000" y="968" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 4</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">정산 완료(매달 7영업일 이후)부터 지급내역 갱신됩니다.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
