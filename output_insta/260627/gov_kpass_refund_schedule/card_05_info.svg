    <text x="1000" y="450" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">청구차감·캐시백 / 7~10영업일</text>
    <line x1="80" y1="492" x2="1000" y2="492" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="582" font-size="42" font-weight="600" fill="#ffffff">우리카드</text>
    <text x="1000" y="582" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">캐시백 / 7~10영업일</text>
    <line x1="80" y1="624" x2="1000" y2="624" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="714" font-size="42" font-weight="600" fill="#ffffff">하나카드</text>
    <text x="1000" y="714" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">청구차감 / 결제일 기준</text>
    <line x1="80" y1="756" x2="1000" y2="756" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="846" font-size="42" font-weight="600" fill="#ffffff">삼성카드</text>
    <text x="1000" y="846" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">청구차감 / 결제일 기준</text>
    <line x1="80" y1="888" x2="1000" y2="888" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="978" font-size="42" font-weight="600" fill="#ffffff">농협카드</text>
    <text x="1000" y="978" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">캐시백 / 7~10영업일</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">2026년 6월 기준 · 카드사 정책 변경 시 달라질 수 있음.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
