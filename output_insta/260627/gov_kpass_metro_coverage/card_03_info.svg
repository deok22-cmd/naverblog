<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 — info 카드 (K-패스 적용·제외 교통수단 한눈에) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">적용 교통수단</text>
  <text x="80" y="276" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">한눈에 보기</text>
  <rect x="82" y="310" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 행 1 -->
    <text x="80" y="430" font-size="40" font-weight="600" fill="#ffffff">수도권 지하철 1~9호선</text>
    <text x="1000" y="430" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">✅ 적용</text>
    <line x1="80" y1="468" x2="1000" y2="468" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <!-- 행 2 -->
    <text x="80" y="556" font-size="40" font-weight="600" fill="#ffffff">신분당선 (민자 노선)</text>
    <text x="1000" y="556" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">✅ 적용</text>
    <line x1="80" y1="594" x2="1000" y2="594" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <!-- 행 3 -->
    <text x="80" y="682" font-size="40" font-weight="600" fill="#ffffff">GTX (수도권 광역급행)</text>
    <text x="1000" y="682" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">✅ 적용</text>
    <line x1="80" y1="720" x2="1000" y2="720" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <!-- 행 4 -->
    <text x="80" y="808" font-size="40" font-weight="600" fill="#ffffff">광역버스·M버스</text>
    <text x="1000" y="808" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">✅ 적용</text>
    <line x1="80" y1="846" x2="1000" y2="846" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <!-- 행 5 -->
    <text x="80" y="934" font-size="40" font-weight="600" fill="#ffffff">부산·대구 등 지방 지하철</text>
    <text x="1000" y="934" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">✅ 적용</text>
    <line x1="80" y1="972" x2="1000" y2="972" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <!-- 행 6 -->
    <text x="80" y="1060" font-size="40" font-weight="600" fill="#ffffff">KTX·SRT·시외·고속버스</text>
    <text x="1000" y="1060" font-size="40" font-weight="800" fill="#b2dfdb" text-anchor="end">❌ 제외</text>
  </g>

  <text x="80" y="1170" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">출처: K-패스 공식 홈페이지 korea-pass.kr · 2026년 6월 기준</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
