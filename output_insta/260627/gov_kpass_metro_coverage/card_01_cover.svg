<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== G0 Cover : 커버 훅 (gov_kpass_metro_coverage 2026-06-27) ===== -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.30" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="scrimTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="0.25" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimTop)"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <!-- 상단 채널 키커 -->
  <text x="80" y="124" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#80cbc4" letter-spacing="3">K-패스 완전정복</text>

  <!-- 메인 타이틀 -->
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="110" font-weight="800" fill="#ffffff" letter-spacing="-3">
    <tspan x="80" y="860">신분당선</tspan>
    <tspan x="80" y="990">도 된다</tspan>
  </text>

  <!-- 서브 타이틀 -->
  <text x="80" y="1088" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="42" font-weight="500" fill="#b2dfdb">K-패스 적용·제외 노선 총정리</text>

  <!-- 구분선 -->
  <rect x="80" y="1118" width="120" height="8" fill="#00796b"/>

  <!-- 하단 설명 -->
  <text x="80" y="1186" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="400" fill="#e0f2f1">GTX·광역버스·지방 대중교통까지</text>
  <text x="80" y="1232" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="400" fill="#e0f2f1">2026년 기준 환급 범위를 정리했습니다.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
