<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P4 : 핵심 팩트 — compare 카드 (K-패스 vs 기후동행카드 비교) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="800" fill="#ffffff">K-패스 vs 기후동행카드</text>
  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="800" fill="#ffffff">노선 범위 비교</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 팩트 A -->
    <text x="80" y="430" font-size="30" font-weight="600" fill="#b2dfdb">신분당선</text>
    <text x="80" y="492" font-size="52" font-weight="800" fill="#ffffff">K-패스 ✅   기후동행 ❌</text>
    <line x1="80" y1="546" x2="1000" y2="546" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 팩트 B -->
    <text x="80" y="630" font-size="30" font-weight="600" fill="#b2dfdb">GTX</text>
    <text x="80" y="692" font-size="52" font-weight="800" fill="#ffffff">K-패스 ✅   기후동행 ❌</text>
    <line x1="80" y1="746" x2="1000" y2="746" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 팩트 C -->
    <text x="80" y="830" font-size="30" font-weight="600" fill="#b2dfdb">경기도 버스 · 광역버스</text>
    <text x="80" y="892" font-size="52" font-weight="800" fill="#ffffff">K-패스 ✅   기후동행 ❌</text>
    <line x1="80" y1="946" x2="1000" y2="946" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 팩트 D -->
    <text x="80" y="1030" font-size="30" font-weight="600" fill="#b2dfdb">KTX · SRT · 시외버스</text>
    <text x="80" y="1092" font-size="52" font-weight="800" fill="#ffffff">K-패스 ❌   기후동행 ❌</text>
  </g>

  <text x="80" y="1210" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">경기·인천 출퇴근이라면 K-패스가 압도적으로 유리합니다.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
