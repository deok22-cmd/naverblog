<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 3포인트 리스트 — point2 (광역버스·GTX·지방) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">더 유리한 이용자들</text>
  <rect x="82" y="284" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 항목 1: 광역버스 -->
    <rect x="80" y="430" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="514" font-size="46" font-weight="700" fill="#ffffff">광역버스 (빨간 버스)</text>
    <text x="80" y="568" font-size="30" font-weight="500" fill="#b2dfdb">기본요금 약 2,800~3,000원 · 20~53% 환급 적용</text>
    <line x1="80" y1="630" x2="1000" y2="630" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 항목 2: GTX -->
    <rect x="80" y="694" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="778" font-size="46" font-weight="700" fill="#ffffff">GTX 이용자</text>
    <text x="80" y="832" font-size="30" font-weight="500" fill="#b2dfdb">수서~동탄 편도 4,150원 수준 · 환급 금액 더 큼</text>
    <line x1="80" y1="894" x2="1000" y2="894" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 항목 3: 지방 -->
    <rect x="80" y="958" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1042" font-size="46" font-weight="700" fill="#ffffff">지방 거주자</text>
    <text x="80" y="1096" font-size="30" font-weight="500" fill="#b2dfdb">부산·대구·광주·대전 도시철도·시내버스 동일 적용</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8d6">요금이 비쌀수록 K-패스 체감 효과가 더 큽니다.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
