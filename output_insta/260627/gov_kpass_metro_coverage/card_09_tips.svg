<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P3 : 체크리스트 — tips 카드 (K-패스 적용 범위 활용 꿀팁) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="210" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">이렇게 쓰면 더 절약</text>
  <rect x="82" y="244" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="370" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="440" font-size="42" font-weight="600" fill="#ffffff">신분당선·GTX는 요금 높아 환급 더 큼</text>
    <line x1="80" y1="500" x2="1000" y2="500" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="550" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="620" font-size="42" font-weight="600" fill="#ffffff">카드 1장으로 지하철·버스·GTX 모두</text>
    <line x1="80" y1="680" x2="1000" y2="680" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="730" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="800" font-size="42" font-weight="600" fill="#ffffff">15회 이상 이용해야 환급 횟수 집계</text>
    <line x1="80" y1="860" x2="1000" y2="860" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="910" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="980" font-size="42" font-weight="600" fill="#ffffff">경기도민은 더경기패스 만 39세까지</text>
  </g>

  <text x="80" y="1090" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#80cbc4">저장해두고 환급 범위 확인하세요  ↓</text>
  <text x="80" y="1180" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">자세한 내용은 프로필 블로그에서 확인하세요.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
