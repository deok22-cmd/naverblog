<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 단계 — course 카드 (더경기패스 혜택 받는 4단계) =====
       슬러그: gov_gyeonggi_pass_vs_kpass · 역할: course · 타입: P2 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">혜택 받는 방법</text>
  <rect x="82" y="274" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 단계 1 -->
    <text x="80" y="410" font-size="42" font-weight="700" fill="#ffffff">K-패스 카드 발급</text>
    <text x="80" y="458" font-size="28" font-weight="500" fill="#b2dfdb">신한·우리·하나·삼성·KB국민 등 제휴 카드사</text>
    <text x="1000" y="426" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">Step 1</text>
    <line x1="80" y1="506" x2="1000" y2="506" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 단계 2 -->
    <text x="80" y="578" font-size="42" font-weight="700" fill="#ffffff">K-패스 앱 카드 등록</text>
    <text x="80" y="626" font-size="28" font-weight="500" fill="#b2dfdb">공식 앱 또는 korea-pass.kr 홈페이지</text>
    <text x="1000" y="594" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">Step 2</text>
    <line x1="80" y1="674" x2="1000" y2="674" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 단계 3 -->
    <text x="80" y="746" font-size="42" font-weight="700" fill="#ffffff">경기도 주소지 인증</text>
    <text x="80" y="794" font-size="28" font-weight="500" fill="#b2dfdb">인증 완료 시 더경기패스 혜택 자동 적용</text>
    <text x="1000" y="762" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">Step 3</text>
    <line x1="80" y1="842" x2="1000" y2="842" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 단계 4 -->
    <text x="80" y="914" font-size="42" font-weight="700" fill="#ffffff">대중교통 이용 시작</text>
    <text x="80" y="962" font-size="28" font-weight="500" fill="#b2dfdb">더경기패스 환급률 자동 적용</text>
    <text x="1000" y="930" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">Step 4</text>
    <line x1="80" y1="1010" x2="1000" y2="1010" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 핵심 요약 -->
    <text x="80" y="1082" font-size="42" font-weight="700" fill="#ffffff">별도 신청 창구 없음</text>
    <text x="1000" y="1082" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">완료</text>
  </g>

  <text x="80" y="1200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">K-패스 앱 하나로 더경기패스 관리.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
