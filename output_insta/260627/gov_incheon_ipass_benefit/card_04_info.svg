<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 — info 카드 =====
       역할: info / 소스: info-table (K-패스 vs 인천 I-패스 비교) / 타입: P1_facts_table
       7행 원본에서 핵심 5행만 발췌 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="800" fill="#ffffff">K-패스 vs 인천 I-패스</text>
  <rect x="82" y="234" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="380" font-size="38" font-weight="600" fill="#ffffff">청년 나이 기준</text>
    <text x="1000" y="380" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">만 39세 (vs 34세)</text>
    <line x1="80" y1="422" x2="1000" y2="422" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="510" font-size="38" font-weight="600" fill="#ffffff">환급 횟수 상한</text>
    <text x="1000" y="510" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">무제한 (vs 월 60회)</text>
    <line x1="80" y1="552" x2="1000" y2="552" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="640" font-size="38" font-weight="600" fill="#ffffff">일반 환급률</text>
    <text x="1000" y="640" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">20% (동일)</text>
    <line x1="80" y1="682" x2="1000" y2="682" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="770" font-size="38" font-weight="600" fill="#ffffff">청년 환급률</text>
    <text x="1000" y="770" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">30% (동일)</text>
    <line x1="80" y1="812" x2="1000" y2="812" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="900" font-size="38" font-weight="600" fill="#ffffff">2자녀 이상 환급률</text>
    <text x="1000" y="900" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">최대 70% (vs 30%)</text>
  </g>

  <text x="80" y="1060" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">2026년 6월 기준 · 인천시 공식 홈페이지(incheon.go.kr) 재확인 권장.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
