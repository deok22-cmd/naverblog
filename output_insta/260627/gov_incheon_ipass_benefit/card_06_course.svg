<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 — course 카드 =====
       역할: course / 소스: step-box 4단계 (신청 방법) / 타입: P2_timeline_text -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">신청 방법 4단계</text>
  <rect x="82" y="274" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="412" font-size="42" font-weight="700" fill="#ffffff">K-패스 카드 발급</text>
    <text x="80" y="458" font-size="28" font-weight="500" fill="#b2dfdb">신한·우리·하나·삼성·KB국민 등 제휴 카드사</text>
    <text x="1000" y="428" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 1</text>
    <line x1="80" y1="510" x2="1000" y2="510" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="582" font-size="42" font-weight="700" fill="#ffffff">K-패스 앱 가입 및 카드 등록</text>
    <text x="80" y="628" font-size="28" font-weight="500" fill="#b2dfdb">공식 앱(K-패스) 또는 korea-pass.kr</text>
    <text x="1000" y="598" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 2</text>
    <line x1="80" y1="680" x2="1000" y2="680" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="752" font-size="42" font-weight="700" fill="#ffffff">주소지 인증</text>
    <text x="80" y="798" font-size="28" font-weight="500" fill="#b2dfdb">인천광역시 확인 → 인천 I-패스 자동 적용</text>
    <text x="1000" y="768" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 3</text>
    <line x1="80" y1="850" x2="1000" y2="850" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="922" font-size="42" font-weight="700" fill="#ffffff">이용 시작</text>
    <text x="80" y="968" font-size="28" font-weight="500" fill="#b2dfdb">인증 후 대중교통 이용 시 자동 적용</text>
    <text x="1000" y="938" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">STEP 4</text>
  </g>

  <text x="80" y="1100" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">별도 인천시 전용 창구 없음 — K-패스 앱 주소 인증으로 완료.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
