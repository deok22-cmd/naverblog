<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== A : 헤드라인-하단 — point2 카드 (계곡 여행 기본 준비물) ===== -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.40" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.82"/>
    </linearGradient>
  </defs>
  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="80" y="852" width="64" height="10" fill="#00796b"/>
  <text x="80" y="960" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="98" font-weight="800" fill="#ffffff" letter-spacing="-2">계곡 필수템</text>

  <g id="chips">
    <rect x="80" y="1010" width="326" height="74" rx="37" fill="#00796b"/>
    <text x="243" y="1058" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">아쿠아슈즈</text>
    <rect x="426" y="1010" width="326" height="74" rx="37" fill="#00796b"/>
    <text x="589" y="1058" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">모기 기피제</text>
  </g>

  <text x="80" y="1186" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="500" fill="#e0f2f1">바위 미끄럼 방지, 체온 유지,</text>
  <text x="80" y="1242" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="500" fill="#e0f2f1">얇은 긴팔 겉옷도 반드시.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
