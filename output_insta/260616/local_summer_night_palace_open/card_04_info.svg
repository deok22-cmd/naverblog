<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 (사진중심 · 전면 스크림 워시만, 불투명 박스/보더 없음) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>
  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">운영시간 한눈에</text>
  <rect x="82" y="304" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="450" font-size="42" font-weight="600" fill="#ffffff">경복궁</text>
    <text x="1000" y="450" font-size="42" font-weight="800" fill="#66bb6a" text-anchor="end">09:00 ~ 18:00</text>
    <line x1="80" y1="492" x2="1000" y2="492" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <text x="80" y="582" font-size="42" font-weight="600" fill="#ffffff">창덕궁 달빛기행</text>
    <text x="1000" y="582" font-size="42" font-weight="800" fill="#66bb6a" text-anchor="end">별도 공지 예정</text>
    <line x1="80" y1="624" x2="1000" y2="624" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <text x="80" y="714" font-size="42" font-weight="600" fill="#ffffff">덕수궁</text>
    <text x="1000" y="714" font-size="42" font-weight="800" fill="#66bb6a" text-anchor="end">09:00 ~ 21:00</text>
    <line x1="80" y1="756" x2="1000" y2="756" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <text x="80" y="846" font-size="42" font-weight="600" fill="#ffffff">창경궁</text>
    <text x="1000" y="846" font-size="42" font-weight="800" fill="#66bb6a" text-anchor="end">09:00 ~ 21:00</text>
    <line x1="80" y1="888" x2="1000" y2="888" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <text x="80" y="978" font-size="42" font-weight="600" fill="#ffffff">서울식물원</text>
    <text x="1000" y="978" font-size="42" font-weight="800" fill="#66bb6a" text-anchor="end">09:00 ~ 18:00~</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#a5d6a7">덕수궁·창경궁 입장마감 20:00 · 식물원 시즌별 연장</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
