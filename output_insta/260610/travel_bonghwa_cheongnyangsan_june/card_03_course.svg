<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_03_course · P2 (코스 단계) · 청량산 주요 등산 코스 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">청량산 코스 선택</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 코스 1 -->
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">청량사 → 자소봉 왕복</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#b2dfdb">약 4km · 입문~중급 · 정상 낙동강 파노라마</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">2.5시간</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 코스 2 -->
    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">능선 종주 코스</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#b2dfdb">자소봉→금탑봉→축융봉→선학봉 · 중급 이상</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">4~5시간</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 코스 3 -->
    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">청량계곡 산책 코스</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#b2dfdb">약 2km · 탐방지원센터→청량계곡→청량사</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">1시간</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 거리 합계 안내 -->
    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">입장료</text>
    <text x="1000" y="952" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">성인 1,000원</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">안동IC → 35번 국도 → 명호면 → 탐방지원센터.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
