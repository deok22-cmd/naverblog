<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 · info 카드 — 밀양 얼음골 핵심 정보 (국내여행 #00796b/#004d40/#e0f2f1) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">정보 한눈에</text>
  <rect x="82" y="234" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="370" font-size="40" font-weight="600" fill="#ffffff">위치</text>
    <text x="1000" y="370" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">경남 밀양시 산내면 남명리</text>
    <line x1="80" y1="408" x2="1000" y2="408" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="492" font-size="40" font-weight="600" fill="#ffffff">지정</text>
    <text x="1000" y="492" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">천연기념물 제224호</text>
    <line x1="80" y1="530" x2="1000" y2="530" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="614" font-size="40" font-weight="600" fill="#ffffff">탐방 시간</text>
    <text x="1000" y="614" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">09:00 ~ 17:00</text>
    <line x1="80" y1="652" x2="1000" y2="652" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="736" font-size="40" font-weight="600" fill="#ffffff">입장료</text>
    <text x="1000" y="736" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">얼음골 1,000원 / 표충사 2,000원</text>
    <line x1="80" y1="774" x2="1000" y2="774" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="858" font-size="40" font-weight="600" fill="#ffffff">최적 시기</text>
    <text x="1000" y="858" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">6월 중순 ~ 8월 초</text>
    <line x1="80" y1="896" x2="1000" y2="896" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="980" font-size="40" font-weight="600" fill="#ffffff">교통</text>
    <text x="1000" y="980" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">밀양IC → 산내면 30~40분</text>
    <line x1="80" y1="1018" x2="1000" y2="1018" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="1102" font-size="40" font-weight="600" fill="#ffffff">주차</text>
    <text x="1000" y="1102" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">얼음골 주차장 유료 운영</text>
  </g>

  <text x="80" y="1210" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">성수기 주말 오전 9시 이전 도착 권장.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
