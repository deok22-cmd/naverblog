<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 — 당일치기 최적 동선 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">당일치기 동선</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">서울 출발 → 호미곶 도착</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#b2dfdb">일출 감상 · 상생의 손 포토</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">04:30 → 07:00</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">등대 전시관 · 독수리바위</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#b2dfdb">해안 드라이브 구간</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">08:30</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">구룡포 근대역사거리</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#b2dfdb">골목 산책</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">10:00</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">구룡포항 물회 점심</text>
    <text x="80" y="998" font-size="28" font-weight="500" fill="#b2dfdb">장기읍성 → 영일대 스카이워크</text>
    <text x="1000" y="968" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">12:00</text>
    <line x1="80" y1="1050" x2="1000" y2="1050" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1122" font-size="42" font-weight="700" fill="#ffffff">포항 출발 귀환</text>
    <text x="1000" y="1122" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">17:00</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">자가용 기준 · 세부 코스는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
