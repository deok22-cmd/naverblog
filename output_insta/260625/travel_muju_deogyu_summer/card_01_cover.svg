<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_01 : Cover (G0) =====
       무주 구천동 여름 피서 카드뉴스 커버
       카테고리: 국내여행 | 팔레트: #00796b/#004d40/#e0f2f1 -->
  <defs>
    <linearGradient id="scrimCover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="0.50" stop-color="#000000" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.78"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimCover)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <!-- 상단 채널 키커 -->
  <text x="80" y="118" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#80cbc4" letter-spacing="4">국내여행 · 여름 피서</text>

  <!-- 메인 타이틀 -->
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="112" font-weight="800" fill="#ffffff" letter-spacing="-3">
    <tspan x="80" y="620">무주</tspan>
    <tspan x="80" y="748">구천동</tspan>
  </text>

  <!-- 서브 타이틀 -->
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="52" font-weight="600" fill="#b2dfdb" letter-spacing="-1">
    <tspan x="80" y="840">33경 계곡 트레킹</tspan>
    <tspan x="80" y="908">설천봉 곤돌라까지</tspan>
  </text>

  <!-- 구분선 -->
  <rect x="80" y="954" width="180" height="8" fill="#00796b"/>

  <!-- 팩트 칩 1 -->
  <rect x="80" y="990" width="280" height="66" rx="33" fill="#00796b"/>
  <text x="220" y="1033" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">수온 12~16°C</text>

  <!-- 팩트 칩 2 -->
  <rect x="380" y="990" width="260" height="66" rx="33" fill="#004d40"/>
  <text x="510" y="1033" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#e0f2f1" text-anchor="middle">곤돌라 20분</text>

  <!-- 하단 슬라이드 유도 -->
  <text x="80" y="1168" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="500" fill="#e0f2f1">한여름 계곡 피서지 완전 정복</text>
  <text x="80" y="1220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="400" fill="#80cbc4">요금 · 코스 · 꿀팁 슬라이드로 확인하세요</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
