<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_08 : point-4 — 타입 B (상단 텍스트) =====
       소스: h2-08 "태백 여름 날씨와 준비물"
       카테고리: 국내여행  primary #00796b / dark #004d40 / light #e0f2f1 -->
  <defs>
    <linearGradient id="scrimTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#000000" stop-opacity="0.66"/>
      <stop offset="0.36" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.78" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimTop)"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="150" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="30" font-weight="700" fill="#80cbc4" letter-spacing="3">날씨 &amp; 준비물</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="82" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="270">7~8월도 반팔만</tspan>
    <tspan x="80" y="362">입으면 안 됩니다</tspan>
  </text>

  <text x="80" y="444" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="38" font-weight="500" fill="#e0f2f1">정상부 바람 강해 체감온도 더 낮음 — 바람막이 필수.</text>

  <text x="80" y="1290" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="34" font-weight="600" fill="#e0f2f1">오후 소나기 잦음 — 우산 대신 우비 권장.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
