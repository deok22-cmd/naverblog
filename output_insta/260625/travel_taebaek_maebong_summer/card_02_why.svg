<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_02 : why — 타입 E (하단 텍스트, 사진 최대) =====
       소스: h2-01 "왜 여름에 가야 하나" + intro-box
       카테고리: 국내여행  primary #00796b / dark #004d40 / light #e0f2f1 -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.52" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.80"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="1040" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="28" font-weight="700" fill="#80cbc4" letter-spacing="3">여름에 가야 하는 이유</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="1132">도심보다 7~8°C</tspan>
    <tspan x="80" y="1214">낮은 고원 피서지</tspan>
  </text>

  <text x="80" y="1278" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="34" font-weight="500" fill="#e0f2f1">6월 말~7월 중순 초록 배추밭 파도 절정</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
