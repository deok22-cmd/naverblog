<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_03 : point-1 — 타입 A (헤드라인 하단) =====
       소스: h2-03 "고랭지 배추밭의 초록 물결, 7월이 절정"
       카테고리: 국내여행  primary #00796b / dark #004d40 / light #e0f2f1 -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.40" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1"    stop-color="#000000" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="80" y="828" width="64" height="10" fill="#00796b"/>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="946">7월 초·중순</tspan>
    <tspan x="80" y="1044">초록 파도 절정</tspan>
  </text>

  <g id="chips">
    <rect x="80" y="1080" width="330" height="68" rx="34" fill="#00796b"/>
    <text x="245" y="1124" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">약 40만 평 규모</text>
    <rect x="424" y="1080" width="330" height="68" rx="34" fill="#00796b"/>
    <text x="589" y="1124" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">풍력발전기 30여 기</text>
  </g>

  <text x="80" y="1202" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="38" font-weight="500" fill="#e0f2f1">7월 말 수확 시작 전, 배추밭 파도를</text>
  <text x="80" y="1252" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="38" font-weight="500" fill="#e0f2f1">풍력발전기와 함께 담는 인생샷 포인트.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
