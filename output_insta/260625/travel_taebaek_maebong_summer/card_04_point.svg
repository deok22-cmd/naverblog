<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_04 : point-2 — 타입 D (중앙 강조 문장) =====
       소스: h2-04 "풍력발전기 트레킹 코스와 전망대"
       카테고리: 국내여행  primary #00796b / dark #004d40 / light #e0f2f1 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.60"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="540" y="450" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="36" font-weight="700" fill="#80cbc4" text-anchor="middle" letter-spacing="3">전망대 도보 코스</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="82" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    <tspan x="540" y="618">주차장에서</tspan>
    <tspan x="540" y="712">전망대까지</tspan>
    <tspan x="540" y="806">단 10분</tspan>
  </text>

  <rect x="490" y="858" width="100" height="6" fill="#00796b"/>

  <text x="540" y="950" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
        font-size="38" font-weight="500" fill="#e0f2f1" text-anchor="middle">블레이드 지름 80~90m — 가까이서 보면 압도적.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif"
          font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
