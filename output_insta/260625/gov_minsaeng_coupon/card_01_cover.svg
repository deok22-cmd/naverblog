<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_01 : 커버 (G0 고정) — 민생회복 소비쿠폰 =====
       카테고리: 생활·정보  팔레트: primary=#388e3c / dark=#1b5e20 / light=#e8f5e9
       accent1=#a5d6a7 / accent2=#c8e6c9 -->
  <defs>
    <linearGradient id="scrimCover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.80"/>
    </linearGradient>
    <linearGradient id="scrimTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.60"/>
      <stop offset="0.30" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#1a2318"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimCover)"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimTop)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <!-- 상단 채널 워드마크 -->
  <text x="80" y="96" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#a5d6a7" letter-spacing="3">travelkorea_365</text>

  <!-- 키커 -->
  <text x="80" y="670" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#a5d6a7" letter-spacing="3">2026 생활정보</text>

  <!-- 메인 타이틀 -->
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="110" font-weight="800" fill="#ffffff" letter-spacing="-3">
    <tspan x="80" y="800">민생회복</tspan>
    <tspan x="80" y="920">소비쿠폰</tspan>
  </text>

  <!-- 강조 구분선 -->
  <rect x="80" y="960" width="200" height="10" fill="#388e3c"/>

  <!-- 서브라인 -->
  <text x="80" y="1054" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="42" font-weight="600" fill="#e8f5e9">대상 확인부터 신청까지,</text>
  <text x="80" y="1108" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="42" font-weight="600" fill="#e8f5e9">한 번에 정리합니다.</text>

  <!-- 지원금 칩 -->
  <rect x="80" y="1160" width="340" height="68" rx="34" fill="#388e3c"/>
  <text x="250" y="1205" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#ffffff">최대 60만원</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
