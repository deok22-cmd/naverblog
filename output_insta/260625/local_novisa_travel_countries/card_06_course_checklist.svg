<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_06 : COURSE (F 텍스트 리스트) =====
       원고 소스: h2 08 출국 전 체크리스트 — 3단계: 1개월 전 / 1주 전 / 당일
       팔레트: primary #388e3c / dark #1b5e20 / light #e8f5e9 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f12"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">출국 전 준비 단계</text>
  <rect x="82" y="284" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="452" width="34" height="8" fill="#a5d6a7"/>
    <text x="80" y="520" font-size="46" font-weight="700" fill="#ffffff">출국 1개월 전</text>
    <text x="80" y="574" font-size="30" font-weight="500" fill="#a5d6a7">여권 유효기간 확인 → ETA·eVisa 신청 → 항공·숙소 예약</text>
    <line x1="80" y1="636" x2="1000" y2="636" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="700" width="34" height="8" fill="#a5d6a7"/>
    <text x="80" y="768" font-size="46" font-weight="700" fill="#ffffff">출국 1주 전</text>
    <text x="80" y="822" font-size="30" font-weight="500" fill="#a5d6a7">0404.go.kr 최신 입국 규정 재확인 → 여행자보험 가입</text>
    <line x1="80" y1="884" x2="1000" y2="884" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="948" width="34" height="8" fill="#a5d6a7"/>
    <text x="80" y="1016" font-size="46" font-weight="700" fill="#ffffff">출국 당일</text>
    <text x="80" y="1070" font-size="30" font-weight="500" fill="#a5d6a7">ETA 승인 이메일 저장 → 귀국 항공권 지참 → 소명 준비</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#c8e6c9">자세한 코스 가이드는 프로필 블로그에서 확인하세요.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
