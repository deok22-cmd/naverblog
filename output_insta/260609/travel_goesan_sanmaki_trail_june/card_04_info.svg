<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_04 : info (P1 — 정보 표 6행) — 방문 요약 정보 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">방문 전 체크</text>
  <rect x="82" y="234" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="370" font-size="40" font-weight="600" fill="#ffffff">위치</text>
    <text x="1000" y="370" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">충북 괴산군 칠성면</text>
    <line x1="80" y1="410" x2="1000" y2="410" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="495" font-size="40" font-weight="600" fill="#ffffff">코스 거리</text>
    <text x="1000" y="495" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">편도 7km / 왕복 14km</text>
    <line x1="80" y1="535" x2="1000" y2="535" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="620" font-size="40" font-weight="600" fill="#ffffff">소요 시간</text>
    <text x="1000" y="620" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">왕복 3.5~4시간</text>
    <line x1="80" y1="660" x2="1000" y2="660" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="745" font-size="40" font-weight="600" fill="#ffffff">입장료</text>
    <text x="1000" y="745" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">무료 (주차 무료)</text>
    <line x1="80" y1="785" x2="1000" y2="785" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="870" font-size="40" font-weight="600" fill="#ffffff">추천 계절</text>
    <text x="1000" y="870" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">5~6월 / 10~11월</text>
    <line x1="80" y1="910" x2="1000" y2="910" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="995" font-size="40" font-weight="600" fill="#ffffff">배편 복귀</text>
    <text x="1000" y="995" font-size="40" font-weight="800" fill="#80cbc4" text-anchor="end">편도 1.5~2시간</text>
  </g>

  <text x="80" y="1120" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">현장 확인 필수 · 괴산군청 043-830-3000</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
