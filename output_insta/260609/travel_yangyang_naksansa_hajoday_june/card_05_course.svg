<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 · course — 양양 당일치기 추천 동선 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">당일치기 추천 동선</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">낙산사 경내 산책</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#b2dfdb">홍예문→해수관음상→홍련암→의상대</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">오전 9시</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">낙산해수욕장 백사장 산책</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#b2dfdb">한산한 6월 동해 여유롭게 즐기기</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">오전 11시</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">낙산사 인근 점심 식사</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#b2dfdb">물회 또는 해산물 (15,000~20,000원)</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">낮 12~13시</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">하조대 방문</text>
    <text x="80" y="998" font-size="28" font-weight="500" fill="#b2dfdb">차로 20분·주차 무료·입장 무료·도보 5분</text>
    <text x="1000" y="968" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">오후 1시 30분</text>
    <line x1="80" y1="1050" x2="1000" y2="1050" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1122" font-size="42" font-weight="700" fill="#ffffff">양양읍 구경 후 귀가</text>
    <text x="1000" y="1122" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">오후 15~17시</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">서울 귀가 평일 기준 약 2시간 30분.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
