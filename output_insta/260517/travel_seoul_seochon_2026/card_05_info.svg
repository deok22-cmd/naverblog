<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 정보타입 P1 : 글래스 테이블 — 카드05 서촌 기본 정보 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="70" y="140" width="940" height="1060" rx="28" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>

  <text x="120" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">서촌 기본 정보</text>
  <rect x="122" y="298" width="130" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="120" y="450" font-size="40" font-weight="600" fill="#ffffff">지하철</text>
    <text x="960" y="450" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">3호선 경복궁역 2번 출구</text>
    <line x1="120" y1="490" x2="960" y2="490" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="580" font-size="40" font-weight="600" fill="#ffffff">소요 시간</text>
    <text x="960" y="580" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">4~6시간</text>
    <line x1="120" y1="620" x2="960" y2="620" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="710" font-size="40" font-weight="600" fill="#ffffff">도시락 예산</text>
    <text x="960" y="710" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">4,000~6,000원</text>
    <line x1="120" y1="750" x2="960" y2="750" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="840" font-size="40" font-weight="600" fill="#ffffff">도시락 카페 운영</text>
    <text x="960" y="840" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">화~일 11:30~13:30</text>
    <line x1="120" y1="880" x2="960" y2="880" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="970" font-size="40" font-weight="600" fill="#ffffff">최적 방문 시기</text>
    <text x="960" y="970" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">봄 4~5월 · 가을 10~11월</text>
    <line x1="120" y1="1010" x2="960" y2="1010" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="1100" font-size="40" font-weight="600" fill="#ffffff">주차</text>
    <text x="960" y="1100" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">도보 방문 권장</text>
  </g>

  <text x="120" y="1160" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="500" fill="#b2dfdb">2026년 기준 · 방문 전 현장 확인 권장.</text>
</svg>
