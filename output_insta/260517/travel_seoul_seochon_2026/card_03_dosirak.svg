<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 그룹타입 C : 좌우 분할 매거진 — 카드03 통인시장 도시락 체험 ===== -->

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <!-- 좌측 세로 패널 -->
  <rect x="0" y="0" width="560" height="1350" fill="#0e1614" fill-opacity="0.90"/>
  <rect x="560" y="0" width="4" height="1350" fill="#00796b"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="70" y="190" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="700" fill="#80cbc4" letter-spacing="3">03 · 통인시장</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="70" y="320">엽전으로</tspan>
    <tspan x="70" y="406">반찬 골라</tspan>
    <tspan x="70" y="492">담는 도시락</tspan>
  </text>

  <rect x="72" y="548" width="120" height="8" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="500" fill="#e0f2f1">
    <text x="70" y="650">엽전 1개=500원,</text>
    <text x="70" y="700">열 가지 반찬을</text>
    <text x="70" y="750">내 손으로 골라 담기.</text>
  </g>

  <rect x="70" y="1170" width="440" height="74" rx="37" fill="#00796b"/>
  <text x="290" y="1218" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="700" fill="#ffffff" text-anchor="middle">4,000~6,000원 체험</text>
</svg>
