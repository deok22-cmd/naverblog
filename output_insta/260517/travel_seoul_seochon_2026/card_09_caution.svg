<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 그룹타입 E : 하단 리본 캡션 — 카드09 주의·에티켓 안내 ===== -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.50" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.60"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <!-- 하단 리본 카드 (3줄 확장) -->
  <rect x="60" y="920" width="960" height="350" rx="24" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>
  <text x="100" y="992" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="26" font-weight="700" fill="#80cbc4" letter-spacing="3">09 · 에티켓·주의</text>
  <text x="100" y="1068" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-1">이곳은 주민 삶의 터전</text>
  <text x="100" y="1136" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="500" fill="#e0f2f1">한옥 담장 너머 무단 촬영 삼가. 큰 소리 금지.</text>
  <text x="100" y="1186" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="500" fill="#e0f2f1">쓰레기는 반드시 지정 쓰레기통에.</text>
  <text x="100" y="1238" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="500" fill="#b2dfdb">골목이 아름다운 건 매일 청소하는 주민 덕분.</text>
</svg>
