<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 정보타입 P3 : 체크리스트 — 카드08 서촌 방문 핵심 팁 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="70" y="170" width="940" height="1010" rx="28" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>

  <text x="120" y="300" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="58" font-weight="800" fill="#ffffff">이것만 알면 실패 없음</text>
  <rect x="122" y="328" width="130" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <path d="M120 438 l13 16 l28 -34" stroke="#00796b" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="460" font-size="38" font-weight="600" fill="#ffffff">도시락 카페 화~일 11:30~13:30만 운영</text>
    <line x1="120" y1="530" x2="960" y2="530" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <path d="M120 578 l13 16 l28 -34" stroke="#00796b" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="600" font-size="38" font-weight="600" fill="#ffffff">이상의 집 무료 · 화~일 10:00~18:00</text>
    <line x1="120" y1="670" x2="960" y2="670" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <path d="M120 718 l13 16 l28 -34" stroke="#00796b" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="740" font-size="38" font-weight="600" fill="#ffffff">주말은 오전 9시 이전 방문이 황금</text>
    <line x1="120" y1="810" x2="960" y2="810" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <path d="M120 858 l13 16 l28 -34" stroke="#00796b" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="880" font-size="38" font-weight="600" fill="#ffffff">소액 현금 필수 · 편한 운동화 착용</text>
  </g>

  <text x="120" y="1010" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="800" fill="#80cbc4">저장해두고 그대로 따라가세요  ↓</text>
  <text x="120" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="500" fill="#b2dfdb">전체 가이드는 프로필 블로그에서.</text>
</svg>
