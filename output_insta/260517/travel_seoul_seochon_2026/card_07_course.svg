<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 정보타입 P2 : 타임라인 스파인 — 카드07 서촌 당일 추천 코스 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="70" y="140" width="940" height="1080" rx="28" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>

  <text x="120" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="58" font-weight="800" fill="#ffffff">당일 추천 코스 (5시간)</text>
  <rect x="122" y="298" width="130" height="9" fill="#00796b"/>

  <!-- 세로 스파인 -->
  <line x1="180" y1="410" x2="180" y2="1060" stroke="#00796b" stroke-width="4"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <circle cx="180" cy="430" r="16" fill="#00796b"/>
    <text x="240" y="425" font-size="38" font-weight="700" fill="#ffffff">경복궁역 2번 출구 출발</text>
    <text x="240" y="468" font-size="26" font-weight="500" fill="#b2dfdb">서쪽 담장 길 도보</text>
    <text x="960" y="440" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">09:00</text>

    <circle cx="180" cy="565" r="16" fill="#00796b"/>
    <text x="240" y="560" font-size="38" font-weight="700" fill="#ffffff">이상의 집 관람</text>
    <text x="240" y="600" font-size="26" font-weight="500" fill="#b2dfdb">체부동·통인동 골목 탐방</text>
    <text x="960" y="575" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">09:20</text>

    <circle cx="180" cy="700" r="16" fill="#00796b"/>
    <text x="240" y="695" font-size="38" font-weight="700" fill="#ffffff">통인시장 도시락 점심</text>
    <text x="240" y="735" font-size="26" font-weight="500" fill="#b2dfdb">엽전 도시락 카페 체험</text>
    <text x="960" y="710" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">11:30</text>

    <circle cx="180" cy="840" r="16" fill="#00796b"/>
    <text x="240" y="835" font-size="38" font-weight="700" fill="#ffffff">한옥 카페 디저트</text>
    <text x="240" y="875" font-size="26" font-weight="500" fill="#b2dfdb">자하문로7길 → 청운공원</text>
    <text x="960" y="850" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">13:00</text>

    <circle cx="180" cy="980" r="16" fill="#00796b"/>
    <text x="240" y="975" font-size="38" font-weight="700" fill="#ffffff">수성동 계곡 → 창의문</text>
    <text x="240" y="1015" font-size="26" font-weight="500" fill="#b2dfdb">인왕산 선바위(선택)</text>
    <text x="960" y="990" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">15:00</text>

    <circle cx="180" cy="1065" r="16" fill="#00796b"/>
    <text x="240" y="1060" font-size="38" font-weight="700" fill="#ffffff">베이커리 카페 마무리</text>
    <text x="960" y="1075" font-size="32" font-weight="800" fill="#80cbc4" text-anchor="end">16:00</text>
  </g>

  <text x="120" y="1188" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="500" fill="#b2dfdb">전체 코스 상세는 프로필 블로그에서.</text>
</svg>
