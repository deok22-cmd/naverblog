<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 — 무섬마을 기본 정보 한눈에 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">정보 한눈에</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="450" font-size="42" font-weight="600" fill="#ffffff">입장료</text>
    <text x="1000" y="450" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">무료</text>
    <line x1="80" y1="492" x2="1000" y2="492" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="582" font-size="42" font-weight="600" fill="#ffffff">주차</text>
    <text x="1000" y="582" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">무료 (200여 대)</text>
    <line x1="80" y1="624" x2="1000" y2="624" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="714" font-size="42" font-weight="600" fill="#ffffff">운영</text>
    <text x="1000" y="714" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">상시 개방, 연중무휴</text>
    <line x1="80" y1="756" x2="1000" y2="756" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="846" font-size="42" font-weight="600" fill="#ffffff">관광안내소</text>
    <text x="1000" y="846" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">10:00~17:00</text>
    <line x1="80" y1="888" x2="1000" y2="888" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="978" font-size="42" font-weight="600" fill="#ffffff">외나무다리</text>
    <text x="1000" y="978" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">폭 30cm · 길이 150m</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">경북 영주시 문수면 수도리 · 2013년 국가민속문화재 마을.</text>
</svg>
