<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 정보타입 P1 : 글래스 테이블 — 케이블카 운영 시간 + 기본 정보 한눈에 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a18"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>

  <rect x="70" y="120" width="940" height="1110" rx="28" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="120" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">정보 한눈에</text>
  <rect x="122" y="278" width="130" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="120" y="400" font-size="42" font-weight="600" fill="#ffffff">2026 개장일</text>
    <text x="960" y="400" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">6월 1일(월)</text>
    <line x1="120" y1="440" x2="960" y2="440" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="530" font-size="42" font-weight="600" fill="#ffffff">해변 규모</text>
    <text x="960" y="530" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">약 800m × 50m</text>
    <line x1="120" y1="570" x2="960" y2="570" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="660" font-size="42" font-weight="600" fill="#ffffff">케이블카 구간</text>
    <text x="960" y="660" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">1.62km</text>
    <line x1="120" y1="700" x2="960" y2="700" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="790" font-size="42" font-weight="600" fill="#ffffff">3~6·9~11월 운영</text>
    <text x="960" y="790" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">09:00~21:00</text>
    <line x1="120" y1="830" x2="960" y2="830" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="920" font-size="42" font-weight="600" fill="#ffffff">7~8월 성수기 운영</text>
    <text x="960" y="920" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">09:00~22:00</text>
    <line x1="120" y1="960" x2="960" y2="960" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="1050" font-size="42" font-weight="600" fill="#ffffff">해수욕장 입장</text>
    <text x="960" y="1050" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">무료</text>
  </g>

  <text x="120" y="1170" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">2026년 기준 · 케이블카·스카이워크 요금은 공식 채널 확인.</text>
</svg>
