<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 그룹타입 E : 하단 리본 캡션 — 스카이워크 짜릿한 유리 바닥 체험 ===== -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.50" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a18"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <!-- 하단 리본 카드 -->
  <rect x="60" y="1000" width="960" height="270" rx="24" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>
  <text x="100" y="1072" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="26" font-weight="700" fill="#80cbc4" letter-spacing="3">06 · 스카이워크</text>
  <text x="100" y="1148" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1">절벽 위 유리 바닥을 걷다</text>
  <text x="100" y="1210" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="500" fill="#e0f2f1">암남공원 해안 절벽 끝, 파도 바로 위에 섭니다.</text>
  <text x="100" y="1254" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="500" fill="#e0f2f1">케이블카 서쪽 스테이션에서 바로 이동 가능.</text>
</svg>
