<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 정보타입 P1 : 글래스 테이블 (교통 정보 한눈에) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#15201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="70" y="120" width="940" height="1110" rx="28" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>

  <text x="120" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">교통 정보 한눈에</text>
  <rect x="122" y="278" width="130" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="120" y="420" font-size="42" font-weight="600" fill="#ffffff">지하철 (리움)</text>
    <text x="960" y="420" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">한강진역 1번 출구 도보 8분</text>
    <line x1="120" y1="460" x2="960" y2="460" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="550" font-size="42" font-weight="600" fill="#ffffff">지하철 (갤러리)</text>
    <text x="960" y="550" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">이태원역 3번 출구 도보 10분</text>
    <line x1="120" y1="590" x2="960" y2="590" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="680" font-size="42" font-weight="600" fill="#ffffff">버스</text>
    <text x="960" y="680" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">한남동주민센터 정류장</text>
    <line x1="120" y1="720" x2="960" y2="720" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="810" font-size="42" font-weight="600" fill="#ffffff">자가용</text>
    <text x="960" y="810" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">리움미술관 주차장 (유료)</text>
    <line x1="120" y1="850" x2="960" y2="850" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="940" font-size="42" font-weight="600" fill="#ffffff">택시·앱</text>
    <text x="960" y="940" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">강남에서 15~20분</text>
    <line x1="120" y1="980" x2="960" y2="980" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="1070" font-size="42" font-weight="600" fill="#ffffff">추천 방문 시간</text>
    <text x="960" y="1070" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">평일 오전 11시~오후 5시</text>
  </g>

  <text x="120" y="1185" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">주말 대중교통 이용 강력 권장 · 주차 매우 제한적.</text>
</svg>
