<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 그룹타입 F : 3포인트 리스트 (인덱스 배지 3항목) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.62"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#15201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="230" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="64" font-weight="800" fill="#ffffff">한남동 3대 갤러리</text>
  <rect x="82" y="262" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <circle cx="120" cy="470" r="40" fill="#00796b"/>
    <text x="120" y="486" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle">1</text>
    <text x="200" y="460" font-size="46" font-weight="700" fill="#ffffff">타데우스로팍 서울</text>
    <text x="200" y="512" font-size="30" font-weight="500" fill="#b2dfdb">아시아 첫 지점 · 세계적 작가 한국 전시</text>
    <line x1="80" y1="580" x2="1000" y2="580" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <circle cx="120" cy="710" r="40" fill="#00796b"/>
    <text x="120" y="726" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle">2</text>
    <text x="200" y="700" font-size="46" font-weight="700" fill="#ffffff">아라리오갤러리 서울</text>
    <text x="200" y="752" font-size="30" font-weight="500" fill="#b2dfdb">한국 대표 민간 현대미술 · 높은 천장고</text>
    <line x1="80" y1="820" x2="1000" y2="820" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <circle cx="120" cy="950" r="40" fill="#00796b"/>
    <text x="120" y="966" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle">3</text>
    <text x="200" y="940" font-size="46" font-weight="700" fill="#ffffff">PKM갤러리</text>
    <text x="200" y="992" font-size="30" font-weight="500" fill="#b2dfdb">아트바젤·프리즈 참가 · 국내 작가 해외 진출</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8d6">대부분 무료 관람 · 화~토 10:00~18:00 · 월요일 휴관.</text>
</svg>
