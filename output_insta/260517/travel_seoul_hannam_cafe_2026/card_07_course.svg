<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 정보타입 P2 : 타임라인 스파인 (주말 하루 동선) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#15201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="70" y="120" width="940" height="1110" rx="28" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>

  <text x="120" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">주말 한남동 완전 동선</text>
  <rect x="122" y="278" width="130" height="9" fill="#00796b"/>

  <!-- 세로 스파인 -->
  <line x1="180" y1="390" x2="180" y2="1060" stroke="#00796b" stroke-width="4"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <circle cx="180" cy="410" r="16" fill="#00796b"/>
    <text x="240" y="405" font-size="40" font-weight="700" fill="#ffffff">한강진역 도착 · 첫 카페</text>
    <text x="240" y="450" font-size="28" font-weight="500" fill="#b2dfdb">스페셜티 드립 커피로 하루 시작</text>
    <text x="960" y="420" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">09:00~10:00</text>

    <circle cx="180" cy="550" r="16" fill="#00796b"/>
    <text x="240" y="545" font-size="40" font-weight="700" fill="#ffffff">리움미술관 관람</text>
    <text x="240" y="590" font-size="28" font-weight="500" fill="#b2dfdb">상설·기획전 + 야외 조각 정원</text>
    <text x="960" y="560" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">10:00~12:00</text>

    <circle cx="180" cy="690" r="16" fill="#00796b"/>
    <text x="240" y="685" font-size="40" font-weight="700" fill="#ffffff">점심 식사</text>
    <text x="240" y="730" font-size="28" font-weight="500" fill="#b2dfdb">리움~꼼데가르송 길 구간 레스토랑</text>
    <text x="960" y="700" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">12:00~13:30</text>

    <circle cx="180" cy="830" r="16" fill="#00796b"/>
    <text x="240" y="825" font-size="40" font-weight="700" fill="#ffffff">꼼데가르송 길 · 갤러리 투어</text>
    <text x="240" y="870" font-size="28" font-weight="500" fill="#b2dfdb">타데우스로팍 · 아라리오 · PKM</text>
    <text x="960" y="840" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">13:30~15:30</text>

    <circle cx="180" cy="970" r="16" fill="#00796b"/>
    <text x="240" y="965" font-size="40" font-weight="700" fill="#ffffff">유엔빌리지 산책 · 뷰 포인트</text>
    <text x="240" y="1010" font-size="28" font-weight="500" fill="#b2dfdb">한강+북한산 조망 · 보광동 카페</text>
    <text x="960" y="980" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">15:30~17:00</text>

    <circle cx="180" cy="1060" r="16" fill="#00796b"/>
    <text x="240" y="1055" font-size="40" font-weight="700" fill="#ffffff">팝업 탐방 · 저녁 레스토랑</text>
    <text x="960" y="1070" font-size="34" font-weight="800" fill="#80cbc4" text-anchor="end">17:00~19:00</text>
  </g>

  <text x="120" y="1180" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">총 도보 5~8km · 편한 신발 필수.</text>
