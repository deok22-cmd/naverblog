<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== 그룹타입 E : 하단 리본 캡션 (사진 지배 + 하단 라운드 리본) ===== -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.50" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#15201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <!-- 하단 리본 카드 -->
  <rect x="60" y="960" width="960" height="300" rx="24" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>
  <text x="100" y="1032" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="26" font-weight="700" fill="#80cbc4" letter-spacing="3">02 · 왜 한남동인가</text>
  <text x="100" y="1098" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-1">서울 트렌드의 원형이 만들어지는 곳</text>
  <text x="100" y="1158" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="500" fill="#e0f2f1">리움미술관 · 세계적 갤러리 · 스페셜티 카페 집결지</text>
  <text x="100" y="1218" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="500" fill="#e0f2f1">평일 오전 11시~오후 5시 · 한강진역 1번 출구</text>
</svg>
