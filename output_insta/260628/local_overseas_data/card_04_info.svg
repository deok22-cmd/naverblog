<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 · info 카드 — 나라별 현지 유심 가격 (생활정보 팔레트) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a0e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">나라별 유심 가격</text>
  <rect x="82" y="304" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="450" font-size="42" font-weight="600" fill="#ffffff">일본 (7일)</text>
    <text x="1000" y="450" font-size="42" font-weight="800" fill="#a5d6a7" text-anchor="end">14,000~28,000원</text>
    <line x1="80" y1="492" x2="1000" y2="492" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="582" font-size="42" font-weight="600" fill="#ffffff">태국 (7일)</text>
    <text x="1000" y="582" font-size="42" font-weight="800" fill="#a5d6a7" text-anchor="end">7,000~14,000원</text>
    <line x1="80" y1="624" x2="1000" y2="624" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="714" font-size="42" font-weight="600" fill="#ffffff">베트남 (7일)</text>
    <text x="1000" y="714" font-size="42" font-weight="800" fill="#a5d6a7" text-anchor="end">4,000~8,000원</text>
    <line x1="80" y1="756" x2="1000" y2="756" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="846" font-size="42" font-weight="600" fill="#ffffff">유럽 (7일)</text>
    <text x="1000" y="846" font-size="42" font-weight="800" fill="#a5d6a7" text-anchor="end">14,000~28,000원</text>
    <line x1="80" y1="888" x2="1000" y2="888" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="978" font-size="42" font-weight="600" fill="#ffffff">미국 (7일)</text>
    <text x="1000" y="978" font-size="42" font-weight="800" fill="#a5d6a7" text-anchor="end">28,000~55,000원</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#c5e1a5">2026년 기준 · 공항 부스·편의점·통신사 매장 구매 가능.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
