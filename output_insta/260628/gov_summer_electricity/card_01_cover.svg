<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== G0 COVER : 커버 (생활정보 팔레트 · gov_summer_electricity) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.38"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.80"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a0e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <!-- 상단 채널 키커 -->
  <text x="80" y="160" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#a5d6a7" letter-spacing="4">생활정보 · 전기요금</text>

  <!-- 메인 타이틀 -->
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="104" font-weight="800" fill="#ffffff" letter-spacing="-3">
    <tspan x="80" y="540">여름</tspan>
    <tspan x="80" y="660">전기요금</tspan>
    <tspan x="80" y="780">폭탄 방어법</tspan>
  </text>

  <!-- 구분 바 -->
  <rect x="80" y="820" width="180" height="10" fill="#388e3c"/>

  <!-- 서브 타이틀 -->
  <text x="80" y="920" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="46" font-weight="600" fill="#e8f5e9">누진제 계산법 · 7·8월 완화</text>
  <text x="80" y="978" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="46" font-weight="600" fill="#e8f5e9">복지할인까지 한번에 정리</text>

  <!-- 보조 칩 -->
  <rect x="80" y="1050" width="380" height="68" rx="34" fill="#388e3c"/>
  <text x="270" y="1094" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#ffffff">2026년 기준 · 한전 공식</text>

  <!-- 하단 안내 -->
  <text x="80" y="1260" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="500" fill="#a5d6a7">cyber.kepco.co.kr</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
