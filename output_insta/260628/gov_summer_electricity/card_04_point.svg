<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 리스트 — card_04 point (생활정보 팔레트 · gov_summer_electricity) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a0e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">에너지캐시백 제도</text>
  <rect x="82" y="284" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="452" width="34" height="8" fill="#a5d6a7"/>
    <text x="80" y="520" font-size="46" font-weight="700" fill="#ffffff">절감하면 현금으로 환급</text>
    <text x="80" y="574" font-size="30" font-weight="500" fill="#a5d6a7">전월 또는 동기 대비 절감량에 비례해 캐시백 제공</text>
    <line x1="80" y1="636" x2="1000" y2="636" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="700" width="34" height="8" fill="#a5d6a7"/>
    <text x="80" y="768" font-size="46" font-weight="700" fill="#ffffff">청구서 차감 방식 지급</text>
    <text x="80" y="822" font-size="30" font-weight="500" fill="#a5d6a7">캐시백은 전기요금 청구서에서 직접 차감</text>
    <line x1="80" y1="884" x2="1000" y2="884" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="948" width="34" height="8" fill="#a5d6a7"/>
    <text x="80" y="1016" font-size="46" font-weight="700" fill="#ffffff">한전ON 앱에서 신청</text>
    <text x="80" y="1070" font-size="30" font-weight="500" fill="#a5d6a7">사이버지점(cyber.kepco.co.kr) 또는 한전ON 앱 신청</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#a5d6a7">세부 기준은 한전 홈페이지(kepco.co.kr) 확인 필요.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
