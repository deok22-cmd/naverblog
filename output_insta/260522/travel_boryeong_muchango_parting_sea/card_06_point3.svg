<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 리스트 — 석대도 탐방 3포인트 (point3) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">석대도 탐방 즐기는 법</text>
  <rect x="82" y="284" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="452" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="520" font-size="46" font-weight="700" fill="#ffffff">바닷길 걷기</text>
    <text x="80" y="574" font-size="30" font-weight="500" fill="#b2dfdb">모래 능선 위 1.5km · 양편 조개·고둥 관찰</text>
    <line x1="80" y1="636" x2="1000" y2="636" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="700" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="768" font-size="46" font-weight="700" fill="#ffffff">갯벌 체험</text>
    <text x="80" y="822" font-size="30" font-weight="500" fill="#b2dfdb">가장자리 갯벌서 조개·게 탐색 · 채취 후 방류</text>
    <line x1="80" y1="884" x2="1000" y2="884" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="948" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1016" font-size="46" font-weight="700" fill="#ffffff">석대도 정상 전망</text>
    <text x="80" y="1070" font-size="30" font-weight="500" fill="#b2dfdb">소나무 숲 오르막 계단 · 보령 해안 한눈에</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8d6">섬 내 화장실 없음 — 출발 전 미리 해결하세요.</text>
</svg>
