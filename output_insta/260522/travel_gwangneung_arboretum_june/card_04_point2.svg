<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_04 : POINT2 (F - 텍스트 3포인트 리스트) — h2 02+06 예약 방법 =====
       국내여행 팔레트 #00796b/#004d40/#e0f2f1/#80cbc4 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">예약 방법 3가지</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- Point 1 -->
    <rect x="80" y="410" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="490" font-size="48" font-weight="800" fill="#ffffff">차량 방문</text>
    <text x="80" y="552" font-size="34" font-weight="500" fill="#b2dfdb">온라인 사전 예약 필수 (reservenew.kna.go.kr)</text>
    <line x1="80" y1="610" x2="1000" y2="610" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- Point 2 -->
    <rect x="80" y="650" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="730" font-size="48" font-weight="800" fill="#ffffff">도보·대중교통 방문</text>
    <text x="80" y="792" font-size="34" font-weight="500" fill="#b2dfdb">현장 매표소에서 바로 구매 가능</text>
    <line x1="80" y1="850" x2="1000" y2="850" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- Point 3 -->
    <rect x="80" y="890" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="970" font-size="48" font-weight="800" fill="#ffffff">숲 해설 프로그램</text>
    <text x="80" y="1032" font-size="34" font-weight="500" fill="#b2dfdb">예약 시스템·전화로 신청, 주말은 경쟁 치열</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">성수기 주말은 빠른 예약이 핵심.</text>
</svg>
