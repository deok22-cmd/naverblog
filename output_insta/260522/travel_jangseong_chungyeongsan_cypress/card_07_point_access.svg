<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_07 : point4 (A 타입 — 헤드라인 하단) — 교통·주차 접근 방법 -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.40" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <rect x="80" y="852" width="64" height="10" fill="#00796b"/>
  <text x="80" y="960" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="90" font-weight="800" fill="#ffffff" letter-spacing="-2">어떻게 가나</text>

  <g id="chips">
    <rect x="80" y="1010" width="360" height="74" rx="37" fill="#00796b"/>
    <text x="260" y="1058" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">서울 → 3~3.5시간</text>
    <rect x="460" y="1010" width="320" height="74" rx="37" fill="#00796b"/>
    <text x="620" y="1058" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">모암 주차장 무료</text>
  </g>

  <text x="80" y="1176" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e0f2f1">호남고속도로 백양사 IC 하차 → 장성 방면.</text>
  <text x="80" y="1232" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e0f2f1">내비 '축령산편백숲 주차장' 입력.</text>
</svg>
