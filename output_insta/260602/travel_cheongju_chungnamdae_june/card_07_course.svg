<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 · course 역할 · 청남대 탐방 동선 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">추천 탐방 동선</text>
  <rect x="82" y="254" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="390" font-size="42" font-weight="700" fill="#ffffff">정문 → 춘추관</text>
    <text x="80" y="434" font-size="28" font-weight="500" fill="#b2dfdb">방문객센터·안내 영상·기념품숍</text>
    <text x="1000" y="406" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">~20분</text>
    <line x1="80" y1="486" x2="1000" y2="486" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="558" font-size="42" font-weight="700" fill="#ffffff">역대 대통령 흉상 → 본관</text>
    <text x="80" y="602" font-size="28" font-weight="500" fill="#b2dfdb">기념수 관람·집무실·응접실·욕실</text>
    <text x="1000" y="574" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">~60분</text>
    <line x1="80" y1="654" x2="1000" y2="654" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="726" font-size="42" font-weight="700" fill="#ffffff">골프장·산책로·낚시터</text>
    <text x="80" y="770" font-size="28" font-weight="500" fill="#b2dfdb">메인 산책로 4km, 전망대·정자 쉼터</text>
    <text x="1000" y="742" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">~90분</text>
    <line x1="80" y1="822" x2="1000" y2="822" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="894" font-size="42" font-weight="700" fill="#ffffff">헬기장 고지대 전망</text>
    <text x="80" y="938" font-size="28" font-weight="500" fill="#b2dfdb">대청호 전경 조망, 체력 필요</text>
    <text x="1000" y="910" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">~30분</text>
    <line x1="80" y1="990" x2="1000" y2="990" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1062" font-size="42" font-weight="700" fill="#ffffff">청남대기념관</text>
    <text x="1000" y="1062" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">~60분</text>
  </g>

  <text x="80" y="1200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 3~4시간 · 셔틀버스 무료(관람권 이용)</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
