<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 · info 역할 · 청남대 기본 정보 6행 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">방문 전 필수 정보</text>
  <rect x="82" y="234" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="370" font-size="40" font-weight="600" fill="#ffffff">위치</text>
    <text x="1000" y="370" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">청주시 상당구 문의면</text>
    <line x1="80" y1="408" x2="1000" y2="408" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="490" font-size="40" font-weight="600" fill="#ffffff">관람료</text>
    <text x="1000" y="490" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">어른 5,000원</text>
    <line x1="80" y1="528" x2="1000" y2="528" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="610" font-size="40" font-weight="600" fill="#ffffff">운영시간</text>
    <text x="1000" y="610" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">09:00~18:00 (하절기)</text>
    <line x1="80" y1="648" x2="1000" y2="648" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="730" font-size="40" font-weight="600" fill="#ffffff">매표 마감</text>
    <text x="1000" y="730" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">17:00</text>
    <line x1="80" y1="768" x2="1000" y2="768" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="850" font-size="40" font-weight="600" fill="#ffffff">휴관일</text>
    <text x="1000" y="850" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">매주 월요일</text>
    <line x1="80" y1="888" x2="1000" y2="888" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="970" font-size="40" font-weight="600" fill="#ffffff">규모</text>
    <text x="1000" y="970" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">183만 ㎡ (약 55만 평)</text>
  </g>

  <text x="80" y="1100" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">청소년·군인 3,000원 / 어린이 2,000원 (단체 할인 별도)</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
