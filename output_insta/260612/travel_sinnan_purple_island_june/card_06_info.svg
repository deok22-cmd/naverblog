    <text x="80" y="712" font-size="56" font-weight="800" fill="#ffffff">3,000원 / 1,000원 / 무료</text>
    <line x1="80" y1="766" x2="1000" y2="766" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="850" font-size="30" font-weight="600" fill="#b2dfdb">자전거 대여 (박지도 · 성인 1인 1시간)</text>
