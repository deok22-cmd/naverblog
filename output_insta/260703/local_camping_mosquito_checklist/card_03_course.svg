<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_03 : Course (P2 layout) — local_camping_mosquito_checklist =====
       카테고리: 생활·정보  팔레트: #388e3c / #1b5e20 / #e8f5e9 / #a5d6a7 / #c8e6c9
       소스: h2 02 — 효과적인 모기 퇴치 제품 조합(1차~4차 방어선) -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a10"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">모기 퇴치 4단계 방어선</text>
  <rect x="82" y="304" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">1차 방어 — 모기 기피제</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#c8e6c9">DEET 20~30% · 어린이는 이카리딘 성분 제품</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">1차</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">2차 방어 — 모기향·훈증기</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#c8e6c9">사이트 전체 넓은 범위 · 연기 없이 쾌적</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">2차</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">3차 방어 — 전기 모기채</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#c8e6c9">텐트 안 자기 전 마지막 소탕</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">3차</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">4차 방어 — 이중 텐트·모기장</text>
    <text x="80" y="998" font-size="28" font-weight="500" fill="#c8e6c9">메쉬 창 환기하면서 모기 진입 원천 차단</text>
    <text x="1000" y="968" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">4차</text>
    <line x1="80" y1="1050" x2="1000" y2="1050" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1122" font-size="42" font-weight="700" fill="#ffffff">단계 중첩이 핵심 전략</text>
    <text x="1000" y="1122" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">완전 방어</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#c8e6c9">단일 제품보다 중첩 방어선이 훨씬 더 효과적입니다.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
