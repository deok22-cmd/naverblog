<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P4 : 핵심 팩트 — info 카드 : 4개 코스 핵심 지표 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">블루로드 4개 코스</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="450" font-size="30" font-weight="600" fill="#b2dfdb">A코스 — 빛의 경로 (강구항~축산항)</text>
    <text x="80" y="512" font-size="56" font-weight="800" fill="#ffffff">14.5km · 약 5시간</text>
    <line x1="80" y1="566" x2="1000" y2="566" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="650" font-size="30" font-weight="600" fill="#b2dfdb">B코스 — 푸른 대게의 길 (축산항~해맞이공원)</text>
    <text x="80" y="712" font-size="56" font-weight="800" fill="#ffffff">13.0km · 약 4시간</text>
    <line x1="80" y1="766" x2="1000" y2="766" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="850" font-size="30" font-weight="600" fill="#b2dfdb">C코스 — 목은 이색의 길 (해맞이공원~고래불전망대)</text>
    <text x="80" y="912" font-size="56" font-weight="800" fill="#ffffff">18.0km · 약 6시간</text>
    <line x1="80" y1="966" x2="1000" y2="966" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1050" font-size="30" font-weight="600" fill="#b2dfdb">D코스 — 고래불의 길 (대진~고래불해수욕장)</text>
    <text x="80" y="1112" font-size="56" font-weight="800" fill="#ffffff">19.1km · 약 6.5시간</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 종주 64.6km · 최소 3박 4일 이상 권장</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
