<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_08 : TIPS (P3 — 체크리스트) — 방문 전 알아두면 좋은 꿀팁 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="260" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="58" font-weight="800" fill="#ffffff">이것만 알면 실패 없음</text>
  <rect x="82" y="294" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="390" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="460" font-size="40" font-weight="600" fill="#ffffff">절정은 축제보다 늦다 — 7월 중하순 狙擊</text>
    <line x1="80" y1="510" x2="1000" y2="510" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="560" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="630" font-size="40" font-weight="600" fill="#ffffff">자외선 차단 + 모자 + 물통 필수</text>
    <line x1="80" y1="680" x2="1000" y2="680" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="730" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="800" font-size="40" font-weight="600" fill="#ffffff">해 질 녘 모기 — 방충 스프레이 지참</text>
    <line x1="80" y1="850" x2="1000" y2="850" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="900" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="970" font-size="40" font-weight="600" fill="#ffffff">꽃·잎 채취 절대 금지 (희귀 자생지)</text>
  </g>

  <text x="80" y="1100" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="800" fill="#80cbc4">저장해두고 그대로 따라가세요  ↓</text>
  <text x="80" y="1196" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 가이드는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
