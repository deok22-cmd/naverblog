<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== D : 중앙 강조 문장 — point: 코엑스 아쿠아리움 =====
       원고 ④ 800종 생물의 신비한 수중 세계 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.44"/>
      <stop offset="0.50" stop-color="#000000" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.72"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="540" y="440" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#80cbc4" letter-spacing="3">서울 강남 · 코엑스</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-2" text-anchor="middle">
    <tspan x="540" y="580">상어와 가오리가</tspan>
    <tspan x="540" y="676">머리 위로 지나간다</tspan>
  </text>

  <rect x="440" y="716" width="200" height="8" fill="#00796b"/>

  <text x="540" y="830" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="42" font-weight="600" fill="#e0f2f1">코엑스 아쿠아리움</text>
  <text x="540" y="904" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="500" fill="#b2dfdb">800종 40,000마리 · 수중 터널</text>

  <text x="540" y="1040" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="500" fill="#e0f2f1">소인(4~12세) 약 24,000원 · 2호선 삼성역 직결</text>
  <text x="540" y="1090" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="33" font-weight="500" fill="#e0f2f1">비 와도 우산 없이 이동 가능</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
