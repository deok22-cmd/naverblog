<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P3 : 체크리스트 — 비 오는 날 대중교통 이동 팁 =====
       원고 ⑩ 4가지 실용 팁 → P3 체크리스트 적합 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="58" font-weight="800" fill="#ffffff">비 오는 날 이동 팁</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="430" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="500" font-size="40" font-weight="600" fill="#ffffff">지하철 직결 장소를 최우선 선택</text>
    <line x1="80" y1="558" x2="1000" y2="558" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="608" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="678" font-size="40" font-weight="600" fill="#ffffff">우산보다 유아용 우비가 편리</text>
    <line x1="80" y1="736" x2="1000" y2="736" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="786" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="856" font-size="40" font-weight="600" fill="#ffffff">유아차: 엘리베이터 위치 미리 확인</text>
    <line x1="80" y1="914" x2="1000" y2="914" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="964" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1034" font-size="40" font-weight="600" fill="#ffffff">오프닝 전략: 오전 10시 개관 시 도착</text>
  </g>

  <text x="80" y="1148" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="800" fill="#80cbc4">저장해두고 출발 전에 확인하세요  ↓</text>
  <text x="80" y="1234" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 장소 가이드는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
