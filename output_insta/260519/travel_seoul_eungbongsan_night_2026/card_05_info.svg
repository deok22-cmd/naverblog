<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_05 : info (P4 — 핵심 팩트) — 응봉산 핵심 정보 4개 =====
       카테고리: 국내여행. 레이아웃 P4: 라벨→값 텍스트 블록 4개 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">응봉산 기본 정보</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="450" font-size="30" font-weight="600" fill="#b2dfdb">위치 · 해발</text>
    <text x="80" y="512" font-size="56" font-weight="800" fill="#ffffff">서울 성동구 응봉동 · 약 95m</text>
    <line x1="80" y1="566" x2="1000" y2="566" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="650" font-size="30" font-weight="600" fill="#b2dfdb">교통 · 도보</text>
    <text x="80" y="712" font-size="56" font-weight="800" fill="#ffffff">옥수역 2번 출구 → 정상 15분</text>
    <line x1="80" y1="766" x2="1000" y2="766" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="850" font-size="30" font-weight="600" fill="#b2dfdb">입장료 · 주차</text>
    <text x="80" y="912" font-size="56" font-weight="800" fill="#ffffff">무료 입장 · 전용 주차장 없음</text>
    <line x1="80" y1="966" x2="1000" y2="966" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1050" font-size="30" font-weight="600" fill="#b2dfdb">봄 개나리 절정</text>
    <text x="80" y="1112" font-size="56" font-weight="800" fill="#ffffff">3월 하순 ~ 4월 초 · 약 5만 주</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">응봉공원 — 대중교통 방문 강력 권장.</text>
</svg>
