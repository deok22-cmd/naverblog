<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 단계 (생활·정보 팔레트 #388e3c/#1b5e20/#e8f5e9) | course — 정부24 PC 발급 4단계 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a0f"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">정부24 발급 단계</text>
  <rect x="82" y="304" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">접속 및 로그인</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#c8e6c9">카카오·PASS·공동인증서로 본인 확인</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">1단계</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">주민등록등본 검색</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#c8e6c9">검색창에 '주민등록등본' 입력 후 발급하기</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">2단계</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">발급 옵션 선택</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#c8e6c9">세대 전체·주민번호 공개 여부 선택</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">3단계</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">출력 또는 PDF 저장</text>
    <text x="80" y="998" font-size="28" font-weight="500" fill="#c8e6c9">프린터 출력 또는 PDF로 저장 — 수수료 무료</text>
    <text x="1000" y="968" font-size="36" font-weight="800" fill="#a5d6a7" text-anchor="end">4단계</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#c8e6c9">오류 시 정부24 고객센터 1588-2188로 문의.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
