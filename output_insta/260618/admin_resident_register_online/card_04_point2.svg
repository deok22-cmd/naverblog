<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== D : 중앙 강조 문장 (생활·정보 팔레트 #388e3c/#1b5e20/#e8f5e9) | point2 — 대리인 발급 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.60"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a0f"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <text x="540" y="448" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="700" fill="#a5d6a7" text-anchor="middle" letter-spacing="3">대리 발급 가능할까?</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="84" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    <tspan x="540" y="620">인터넷은</tspan>
    <tspan x="540" y="716">본인만 가능</tspan>
    <tspan x="540" y="812">세대원은 방문으로</tspan>
  </text>

  <rect x="490" y="866" width="100" height="6" fill="#388e3c"/>

  <text x="540" y="958" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#c8e6c9" text-anchor="middle">제3자는 위임장 + 관련 서류 필수입니다.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
