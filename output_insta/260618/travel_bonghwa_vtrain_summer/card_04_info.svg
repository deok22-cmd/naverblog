<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 — info (V-train 운행 핵심 정보) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">V-train 운행 정보</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="450" font-size="38" font-weight="600" fill="#ffffff">운행 구간</text>
    <text x="1000" y="450" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">분천→철암 편도 약 27km</text>
    <line x1="80" y1="490" x2="1000" y2="490" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="578" font-size="38" font-weight="600" fill="#ffffff">1일 운행</text>
    <text x="1000" y="578" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">3회 왕복 (정기)</text>
    <line x1="80" y1="618" x2="1000" y2="618" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="706" font-size="38" font-weight="600" fill="#ffffff">운행 없는 날</text>
    <text x="1000" y="706" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">월요일 · 화요일</text>
    <line x1="80" y1="746" x2="1000" y2="746" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="834" font-size="38" font-weight="600" fill="#ffffff">각 역 정차</text>
    <text x="1000" y="834" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">10~15분 내외</text>
    <line x1="80" y1="874" x2="1000" y2="874" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="962" font-size="38" font-weight="600" fill="#ffffff">편도 소요</text>
    <text x="1000" y="962" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">약 1시간 30분</text>
  </g>

  <text x="80" y="1096" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">예매: korail.com 또는 코레일 KTX 앱 · 출발 1개월 전 오픈</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
