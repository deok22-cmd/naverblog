  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <!-- 상단 채널 태그 -->
  <text x="80" y="120" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#80cbc4" letter-spacing="3">travelkorea_365</text>

