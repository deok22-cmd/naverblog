<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_04 : info (P4_key_facts) — 예약처 핵심 팩트 4종 =====
       카테고리: 생활·정보  팔레트: #388e3c / #1b5e20 / #e8f5e9 / #a5d6a7 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1a10"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">예약처 한눈에</text>
  <rect x="82" y="304" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="450" font-size="30" font-weight="600" fill="#a5d6a7">국립공원 야영장</text>
    <text x="80" y="512" font-size="46" font-weight="800" fill="#ffffff">reservation.knps.or.kr · 연중 추첨제</text>
    <line x1="80" y1="554" x2="1000" y2="554" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="638" font-size="30" font-weight="600" fill="#a5d6a7">국립자연휴양림</text>
    <text x="80" y="700" font-size="46" font-weight="800" fill="#ffffff">숲나들e(foresttrip.go.kr)</text>
    <text x="80" y="754" font-size="36" font-weight="600" fill="#e8f5e9">평일 수요일 오전 선착순 · 주말 추첨</text>
    <line x1="80" y1="796" x2="1000" y2="796" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="880" font-size="30" font-weight="600" fill="#a5d6a7">캠핑장 정보 검색</text>
    <text x="80" y="942" font-size="46" font-weight="800" fill="#ffffff">고캠핑(gocamping.or.kr)</text>
    <text x="80" y="996" font-size="36" font-weight="600" fill="#e8f5e9">전국 캠핑장 정보 포털 — 직접 예약 아님</text>
    <line x1="80" y1="1038" x2="1000" y2="1038" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1122" font-size="30" font-weight="600" fill="#a5d6a7">지자체 캠핑장</text>
    <text x="80" y="1184" font-size="46" font-weight="800" fill="#ffffff">각 시·군·구 공식 페이지</text>
    <text x="80" y="1238" font-size="36" font-weight="600" fill="#e8f5e9">창구 제각각 — 공식 페이지 직접 확인</text>
  </g>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#1b5e20"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
