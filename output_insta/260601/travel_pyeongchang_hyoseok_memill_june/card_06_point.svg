<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_06 : F 타입 — point (봉평 메밀 음식 3종) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1a"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">봉평 메밀 삼총사</text>
  <rect x="82" y="256" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 포인트 1 -->
    <rect x="80" y="360" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="440" font-size="54" font-weight="800" fill="#ffffff">메밀 막국수</text>
    <text x="80" y="502" font-size="36" font-weight="500" fill="#e0f2f1">직접 제분 · 투박하고 고소한 맛</text>
    <line x1="80" y1="548" x2="1000" y2="548" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 포인트 2 -->
    <rect x="80" y="596" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="676" font-size="54" font-weight="800" fill="#ffffff">메밀전병</text>
    <text x="80" y="738" font-size="36" font-weight="500" fill="#e0f2f1">김치·두부·당근 — 간식 겸 한 끼</text>
    <line x1="80" y1="784" x2="1000" y2="784" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 포인트 3 -->
    <rect x="80" y="832" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="912" font-size="54" font-weight="800" fill="#ffffff">메밀묵</text>
    <text x="80" y="974" font-size="36" font-weight="500" fill="#e0f2f1">보들보들·고소 · 양념장 얹어 가볍게</text>
  </g>

  <text x="80" y="1118" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#80cbc4">1만 원 내외 — 오일장·시내 식당</text>
  <text x="80" y="1200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">장날 아닌 날도 봉평 시내 메밀 전문점 이용 가능.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
