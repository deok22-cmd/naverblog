<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_09 : tips — P3 체크리스트 / 화진포 실전 팁 4항목 -->
  <!-- ===== P3 : 체크리스트 (스크림 워시 · 박스 없음) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="260" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="56" font-weight="800" fill="#ffffff">화진포 실전 체크리스트</text>
  <rect x="82" y="294" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="390" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="460" font-size="42" font-weight="600" fill="#ffffff">이른 아침 방문 — 물안개·일출 감상</text>
    <line x1="80" y1="520" x2="1000" y2="520" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="570" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="640" font-size="42" font-weight="600" fill="#ffffff">6월 중하순 해당화 개화 절정 노리기</text>
    <line x1="80" y1="700" x2="1000" y2="700" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="750" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="820" font-size="42" font-weight="600" fill="#ffffff">별장 3곳 통합 입장권으로 효율적 관람</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="930" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1000" font-size="42" font-weight="600" fill="#ffffff">숙박은 속초·양양 — 성수기 대비 30~50% 저렴</text>
  </g>

  <text x="80" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#80cbc4">저장해두고 떠나기 전 체크하세요  ↓</text>
  <text x="80" y="1200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 가이드는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
