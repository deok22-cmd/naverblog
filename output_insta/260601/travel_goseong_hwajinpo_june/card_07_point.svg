<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_07 : point — F 텍스트 3포인트 / 별장 3곳 각 특징 -->
  <!-- ===== F : 텍스트 3포인트 리스트 (전면 스크림 · 정확히 3개 병렬) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2420"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">역사 별장 3곳 탐방</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 포인트 1 -->
    <rect x="80" y="410" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="480" font-size="46" font-weight="700" fill="#ffffff">화진포의 성 (이승만 별장)</text>
    <text x="80" y="530" font-size="32" font-weight="500" fill="#b2dfdb">1954년 건축 단층 석조 · 화진포호·동해 조망 데크</text>
    <line x1="80" y1="580" x2="1000" y2="580" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 포인트 2 -->
    <rect x="80" y="630" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="700" font-size="46" font-weight="700" fill="#ffffff">이기붕 부통령 별장</text>
    <text x="80" y="750" font-size="32" font-weight="500" fill="#b2dfdb">이승만 별장 바로 아래 · 동선 연계 가능</text>
    <line x1="80" y1="800" x2="1000" y2="800" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 포인트 3 -->
    <rect x="80" y="850" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="920" font-size="46" font-weight="700" fill="#ffffff">김일성 별장</text>
    <text x="80" y="970" font-size="32" font-weight="500" fill="#b2dfdb">1948년 당시 원형 복원 · 분단 역사 전시</text>
  </g>

  <text x="80" y="1090" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#80cbc4">3곳 통합 관람 약 1시간 30분  →</text>
  <text x="80" y="1180" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">통합 입장권으로 세 별장 모두 관람 가능.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
