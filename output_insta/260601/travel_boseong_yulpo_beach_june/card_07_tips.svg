<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_07 : TIPS (P3 — 체크리스트) — 보성 방문 전 체크리스트 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="58" font-weight="800" fill="#ffffff">보성 가기 전 확인하세요</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="430" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="500" font-size="40" font-weight="600" fill="#ffffff">대한다원 입장료 현장 확인</text>
    <line x1="80" y1="555" x2="1000" y2="555" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="600" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="670" font-size="40" font-weight="600" fill="#ffffff">율포해수녹차센터 운영 시간 확인</text>
    <line x1="80" y1="725" x2="1000" y2="725" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="775" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="845" font-size="40" font-weight="600" fill="#ffffff">렌터카·자가용 준비 (셔틀 없음)</text>
    <line x1="80" y1="900" x2="1000" y2="900" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="950" width="34" height="8" fill="#80cbc4"/>
    <text x="80" y="1020" font-size="40" font-weight="600" fill="#ffffff">저녁 7~8시 율포 낙조 일정 확보</text>
  </g>

  <text x="80" y="1140" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="800" fill="#80cbc4">저장해두고 그대로 따라가세요  ↓</text>
  <text x="80" y="1230" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">전체 코스는 프로필 블로그에서.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
