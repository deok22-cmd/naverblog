<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.42" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma: 이 사각형 선택 → Fill을 'Image'로 → Gemini 카드6 배경 PNG ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#181c1a"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text id="index" x="990" y="190" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="150" font-weight="800" fill="#ffffff" fill-opacity="0.16" text-anchor="end">04</text>

  <g id="headline">
    <rect x="80" y="852" width="64" height="10" fill="#00796b"/>
    <text x="80" y="980" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="98" font-weight="800" fill="#ffffff" letter-spacing="-2">힙지로 카페</text>
  </g>

  <g id="chips">
    <rect x="80" y="1030" width="330" height="74" rx="37" fill="#00796b"/>
    <text x="245" y="1078" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">공장 → 카페로</text>
    <rect x="430" y="1030" width="330" height="74" rx="37" fill="#00796b"/>
    <text x="595" y="1078" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">낮 11~15시 한적</text>
  </g>

  <text id="subline" x="80" y="1196" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="500" fill="#e0f2f1">주소 대신 인스타 해시태그로 찾고,</text>
  <text x="80" y="1252" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="500" fill="#e0f2f1">야간 포차 전 낮에 들르면 한적합니다.</text>
</svg>
