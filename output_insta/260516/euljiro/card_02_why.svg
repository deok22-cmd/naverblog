<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.40" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.80"/>
    </linearGradient>
    <linearGradient id="scrimTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.45"/>
      <stop offset="0.26" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma: 이 사각형 1개만 선택 → Fill을 'Image'로 교체 → Gemini 카드2 배경 PNG, Crop ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#181f1d"/>
  <!-- ▲▲▲ 위 사각형이 배경 슬롯입니다 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimTop)"/>
  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>

  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <g id="badge">
    <rect x="80" y="84" width="306" height="64" rx="32" fill="#00796b"/>
    <text x="233" y="126" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="29" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">왜 가야 할까</text>
  </g>

  <g id="title">
    <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="96" font-weight="800" fill="#ffffff" letter-spacing="-3">
      <tspan x="80" y="820">낮과 밤이</tspan>
      <tspan x="80" y="936">정반대인 골목</tspan>
    </text>
  </g>

  <g id="reasons" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="600" fill="#e0f2f1">
    <text x="80" y="1028">① 낮은 공구 거리, 밤은 야외 포차</text>
    <text x="80" y="1094">② 노가리 3,000원 · 생맥주 2,000원~</text>
    <text x="80" y="1160">③ 폐공장이 변신한 힙지로 카페</text>
  </g>

  <text x="80" y="1262" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8d6">오늘의 야간 코스  →</text>
</svg>
