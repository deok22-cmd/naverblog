<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma: 이 사각형 선택 → Fill을 'Image'로 → Gemini 카드7(저디테일) 배경 PNG ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#161d1b"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>

  <!-- 글래스 정보 패널 -->
  <g id="panel">
    <rect x="70" y="170" width="940" height="1010" rx="28" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>
  </g>

  <g id="panel-title">
    <text x="120" y="300" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">야간 집중 3시간 코스</text>
    <rect x="122" y="328" width="130" height="9" fill="#00796b"/>
  </g>

  <g id="rows" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="120" y="470" font-size="42" font-weight="600" fill="#ffffff">PM 6:00 을지로3가역</text>
    <text x="960" y="470" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">출발</text>
    <line x1="120" y1="510" x2="960" y2="510" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="600" font-size="42" font-weight="600" fill="#ffffff">1차 · 노가리 골목</text>
    <text x="960" y="600" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">60분</text>
    <line x1="120" y1="640" x2="960" y2="640" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="730" font-size="42" font-weight="600" fill="#ffffff">2차 · 힙지로 바·이자카야</text>
    <text x="960" y="730" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">60분</text>
    <line x1="120" y1="770" x2="960" y2="770" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="860" font-size="42" font-weight="600" fill="#ffffff">3차 · 골뱅이무침 야식</text>
    <text x="960" y="860" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">60분</text>
    <line x1="120" y1="900" x2="960" y2="900" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="990" font-size="42" font-weight="600" fill="#ffffff">총 소요 시간</text>
    <text x="960" y="990" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">약 3시간</text>
  </g>

  <text x="120" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">낮+밤 풀코스(약 6시간)는 프로필 블로그에서.</text>
</svg>
