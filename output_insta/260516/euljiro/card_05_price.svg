<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma: 이 사각형 선택 → Fill을 'Image'로 → Gemini 카드5(저디테일) 배경 PNG ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>

  <!-- 글래스 정보 패널 -->
  <g id="panel">
    <rect x="70" y="170" width="940" height="1010" rx="28" fill="#000000" fill-opacity="0.58" stroke="#00796b" stroke-width="2"/>
  </g>

  <g id="panel-title">
    <text x="120" y="300" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">메뉴 · 가격 한눈에</text>
    <rect x="122" y="328" width="130" height="9" fill="#00796b"/>
  </g>

  <g id="rows" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="120" y="470" font-size="42" font-weight="600" fill="#ffffff">노가리 (구운 명태)</text>
    <text x="960" y="470" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">3,000원</text>
    <line x1="120" y1="510" x2="960" y2="510" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="600" font-size="42" font-weight="600" fill="#ffffff">생맥주 (플라스틱컵)</text>
    <text x="960" y="600" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">2,000~3,000원</text>
    <line x1="120" y1="640" x2="960" y2="640" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="730" font-size="42" font-weight="600" fill="#ffffff">골뱅이무침 (소면 포함)</text>
    <text x="960" y="730" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">12,000~18,000원</text>
    <line x1="120" y1="770" x2="960" y2="770" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="860" font-size="42" font-weight="600" fill="#ffffff">오징어볶음</text>
    <text x="960" y="860" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">10,000~14,000원</text>
    <line x1="120" y1="900" x2="960" y2="900" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="120" y="990" font-size="42" font-weight="600" fill="#ffffff">닭발</text>
    <text x="960" y="990" font-size="42" font-weight="800" fill="#80cbc4" text-anchor="end">8,000~12,000원</text>
  </g>

  <text x="120" y="1110" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">2026년 기준 · 대부분 현금 결제만 가능합니다.</text>
</svg>
