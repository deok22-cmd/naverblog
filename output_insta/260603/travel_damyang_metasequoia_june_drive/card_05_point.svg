<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== D : 중앙 강조 문장 — point 카드 (6월 신록, 빛의 샤워) ===== -->
  <defs>
    <linearGradient id="scrimCenter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="0.42" stop-color="#000000" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d2b22"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimCenter)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="540" y="520" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#80cbc4" letter-spacing="4">6월의 특권</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="90" font-weight="800" fill="#ffffff" letter-spacing="-3">
    <tspan x="540" y="650" text-anchor="middle">빛이 잎을</tspan>
    <tspan x="540" y="756" text-anchor="middle">뚫고 쏟아진다</tspan>
  </text>

  <rect x="440" y="820" width="200" height="8" fill="#00796b"/>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="500" fill="#e0f2f1">
    <tspan x="540" y="900" text-anchor="middle">수백 그루가 만드는 녹색 대성당,</tspan>
    <tspan x="540" y="956" text-anchor="middle">아침 7~9시 안개까지 더해지면</tspan>
    <tspan x="540" y="1012" text-anchor="middle">다른 계절에는 없는 장면이 펼쳐집니다.</tspan>
  </text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
