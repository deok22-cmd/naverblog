<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- D : 중앙 강조 문장 — point3 / 불상 없는 대웅전, 통도사의 비밀 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.60"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="540" y="470" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="700" fill="#80cbc4" text-anchor="middle" letter-spacing="3">통도사 · 한국 삼보사찰</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="80" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    <tspan x="540" y="630">대웅전에</tspan>
    <tspan x="540" y="726">불상이 없다</tspan>
  </text>

  <rect x="490" y="782" width="100" height="6" fill="#00796b"/>

  <text x="540" y="880" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e0f2f1" text-anchor="middle">진신사리를 봉안했기에</text>
  <text x="540" y="934" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e0f2f1" text-anchor="middle">부처님이 이곳에 계시다는 의미.</text>
  <text x="540" y="1010" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="500" fill="#b2dfdb" text-anchor="middle">신라 646년 자장율사 창건, 국보 지정.</text>
</svg>
