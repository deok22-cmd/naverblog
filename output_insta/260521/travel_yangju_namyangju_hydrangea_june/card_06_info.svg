<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P1 : 정보 표 — info (교통·주차 정보, 양주 나리농원 / 남양주 천마산) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">교통 · 주차</text>
  <rect x="82" y="254" width="140" height="9" fill="#00796b"/>

  <!-- 헤더 라벨 -->
  <text x="80" y="340" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#80cbc4">양주 나리농원</text>
  <text x="700" y="340" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#80cbc4">남양주 천마산</text>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 서울에서 거리 -->
    <text x="80" y="430" font-size="36" font-weight="600" fill="#b2dfdb">서울에서</text>
    <text x="80" y="472" font-size="38" font-weight="800" fill="#ffffff">40~50분 (39번 국도)</text>
    <text x="700" y="472" font-size="38" font-weight="800" fill="#80cbc4">45~60분 (46번 국도)</text>
    <line x1="80" y1="512" x2="1000" y2="512" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <!-- 주차 -->
    <text x="80" y="582" font-size="36" font-weight="600" fill="#b2dfdb">주차</text>
    <text x="80" y="624" font-size="38" font-weight="800" fill="#ffffff">농원 내 주차장 (유료)</text>
    <text x="700" y="624" font-size="38" font-weight="800" fill="#80cbc4">입구 공영주차장</text>
    <line x1="80" y1="664" x2="1000" y2="664" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <!-- 대중교통 -->
    <text x="80" y="734" font-size="36" font-weight="600" fill="#b2dfdb">대중교통</text>
    <text x="80" y="776" font-size="35" font-weight="800" fill="#ffffff">의정부역 → 양주 버스</text>
    <text x="700" y="776" font-size="35" font-weight="800" fill="#80cbc4">마석역 → 마을버스</text>
    <line x1="80" y1="816" x2="1000" y2="816" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <!-- 입장료 -->
    <text x="80" y="886" font-size="36" font-weight="600" fill="#b2dfdb">입장료</text>
    <text x="80" y="928" font-size="38" font-weight="800" fill="#ffffff">꽃 시즌 소액 (현장확인)</text>
    <text x="700" y="928" font-size="38" font-weight="800" fill="#80cbc4">천마산 무료</text>
  </g>

  <text x="80" y="1080" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">2026년 기준 · 방문 전 공식 SNS 또는 현장 확인 권장.</text>
</svg>
