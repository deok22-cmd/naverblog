<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 — course (양주→남양주 당일 드라이브 코스) ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="220" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">당일 드라이브 코스</text>
  <rect x="82" y="254" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="380" font-size="42" font-weight="700" fill="#ffffff">서울 출발</text>
    <text x="80" y="420" font-size="28" font-weight="500" fill="#b2dfdb">자가용 기준 40분~1시간</text>
    <text x="1000" y="396" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">08:30</text>
    <line x1="80" y1="460" x2="1000" y2="460" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="532" font-size="42" font-weight="700" fill="#ffffff">양주 나리농원</text>
    <text x="80" y="572" font-size="28" font-weight="500" fill="#b2dfdb">수국 감상 · 넓은 밭 산책</text>
    <text x="1000" y="548" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">09:30  약 2h</text>
    <line x1="80" y1="612" x2="1000" y2="612" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="684" font-size="42" font-weight="700" fill="#ffffff">양주 인근 점심</text>
    <text x="80" y="724" font-size="28" font-weight="500" fill="#b2dfdb">나리농원 인근 카페·식당</text>
    <text x="1000" y="700" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">11:30</text>
    <line x1="80" y1="764" x2="1000" y2="764" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="836" font-size="42" font-weight="700" fill="#ffffff">남양주 묘적사 트레킹</text>
    <text x="80" y="876" font-size="28" font-weight="500" fill="#b2dfdb">왕복 약 2시간 · 계곡 수국길</text>
    <text x="1000" y="852" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">14:00  약 2h</text>
    <line x1="80" y1="916" x2="1000" y2="916" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="988" font-size="42" font-weight="700" fill="#ffffff">수동·삼봉리 카페거리</text>
    <text x="80" y="1028" font-size="28" font-weight="500" fill="#b2dfdb">계곡 뷰 카페에서 마무리</text>
    <text x="1000" y="1004" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">16:00</text>
  </g>

  <text x="80" y="1160" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">총 이동거리 약 90km · 서울 귀가 17:30 출발.</text>
</svg>
