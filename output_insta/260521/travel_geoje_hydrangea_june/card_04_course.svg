<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_04 : course (P2 — 트레킹 코스 단계) — 예구마을→공곶이 해변 동선 ===== -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">트레킹 코스 동선</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">예구마을 주차장 출발</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#b2dfdb">소형차 30여 대 수용</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">출발점</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">초반 500m — 완만한 오르막</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#b2dfdb">수국·야생화 풍성</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">0~500m</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">중반 500m — 소나무숲·동백군락</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#b2dfdb">그늘 구간, 오전 빛이 최적</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">500~1000m</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">종반 500m — 급경사 내리막</text>
    <text x="80" y="998" font-size="28" font-weight="500" fill="#b2dfdb">해변 조망 포인트 다수</text>
    <text x="1000" y="968" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">1000~1500m</text>
    <line x1="80" y1="1050" x2="1000" y2="1050" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1122" font-size="42" font-weight="700" fill="#ffffff">공곶이 해변 도착</text>
    <text x="1000" y="1122" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">왕복 약 1시간 30분</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">빠르면 편도 25분 · 천천히 40분 · 방향 표지 완비.</text>
</svg>
