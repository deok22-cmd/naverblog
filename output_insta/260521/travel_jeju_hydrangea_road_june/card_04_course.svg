<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== P2 : 코스 단계 — course : 대중교통으로 수국 즐기기 =====
       travel_jeju_hydrangea_road_june · 국내여행 팔레트 -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="58" font-weight="800" fill="#ffffff">렌터카 없이 가는 법</text>
  <rect x="82" y="275" width="140" height="9" fill="#00796b"/>

  <!-- 동쪽 코스 -->
  <text x="80" y="370" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#80cbc4" letter-spacing="2">동쪽 코스</text>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="404" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="464" font-size="40" font-weight="700" fill="#ffffff">제주 시내·공항</text>
    <text x="80" y="512" font-size="28" font-weight="500" fill="#b2dfdb">시외버스 101번 or 201번 승차</text>
    <line x1="80" y1="558" x2="1000" y2="558" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="576" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="636" font-size="40" font-weight="700" fill="#ffffff">구좌읍 하차</text>
    <text x="80" y="684" font-size="28" font-weight="500" fill="#b2dfdb">종달리·하도리 방면, 마을버스 or 도보</text>
    <line x1="80" y1="730" x2="1000" y2="730" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  </g>

  <!-- 서쪽 코스 -->
  <text x="80" y="810" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#80cbc4" letter-spacing="2">서쪽 코스</text>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <rect x="80" y="844" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="904" font-size="40" font-weight="700" fill="#ffffff">제주 시내</text>
    <text x="80" y="952" font-size="28" font-weight="500" fill="#b2dfdb">시외버스 151번 (제주~모슬포) 승차</text>
    <line x1="80" y1="998" x2="1000" y2="998" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <rect x="80" y="1016" width="30" height="7" fill="#80cbc4"/>
    <text x="80" y="1076" font-size="40" font-weight="700" fill="#ffffff">안덕면 하차</text>
    <text x="80" y="1124" font-size="28" font-weight="500" fill="#b2dfdb">안덕계곡·화순 방향 이동 (택시 병행)</text>
  </g>

  <text x="80" y="1260" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">배차 간격 30분~1시간 · 시간표 미리 확인 필수.</text>
</svg>
