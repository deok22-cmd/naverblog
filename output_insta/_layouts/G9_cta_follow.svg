<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== G9 CTA 표준 템플릿 : 팔로우 유도(흰 팔로우 카드) =====
       2026-05-18 정식 표준(샘플1 기반, 사용자 승인 전면 교체). 이 파일이 G9 단일 절대 표준.
       ※ README §0 "불투명 패널 전면 금지"의 유일한 명문 예외 = 아래 #follow-card 흰 카드 1개.
          CTA 외 카드엔 적용 금지. 자동검수·후속 에이전트가 흰 카드를 되돌리지 말 것.
       ※ 색은 카테고리 팔레트만 치환(여기 값은 국내여행 #00796b/#004d40/#80cbc4 기준).
       ※ 채우는 곳: ⟪HEADLINE_L1⟫(고정 "새로운 출발" 권장 톤·slug별 변형 가능)
          ⟪HEADLINE_L2⟫/⟪HEADLINE_L3⟫(‘주제’와 함께 ○○ — slug 시드로 동사·앵글 변형, 글마다 1줄차 상이)
          ⟪SUB_COPY⟫(예 "다음 여행 코스 받아보기") · ⟪INFO_CHIP⟫(원고 위치/접근 사실, 없으면 칩 삭제)
          ⟪BLOG_LINE⟫(자기 블로그 안내) · ⟪HASHTAGS⟫(원고 .tag 상위 5개).
       ※ @travelkorea_365 = 계정 핸들 상수(브랜드 워드마크·팔로우 카드 2곳). 계정 변경 시 이 파일만 수정. -->
  <defs>
    <linearGradient id="scrimAll" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#0d1f1c"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimAll)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <!-- 북마크 아이콘 (저장 유도 보강 — G9 표준 유지) -->
  <path id="bookmark" d="M912 84 h78 a10 10 0 0 1 10 10 v150 l-49 -33 -49 33 v-150 a10 10 0 0 1 10 -10 z" fill="#00796b"/>

  <!-- 상단 브랜드 워드마크 (핸들 상수) -->
  <text x="540" y="152" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="800" fill="#ffffff" letter-spacing="4">travelkorea_365</text>

  <!-- 헤드라인 (중앙) — slug별 변형 의무: 동사·문장구조·앵글을 원고 주제+시드로 다르게 -->
  <g id="cta-title">
    <text x="540" y="566" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="48" font-weight="600" fill="#b2dfdb" letter-spacing="2">⟪HEADLINE_L1⟫</text>
    <text x="540" y="664" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">⟪HEADLINE_L2⟫</text>
    <text x="540" y="754" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">⟪HEADLINE_L3⟫</text>
  </g>

  <!-- 흰색 팔로우 카드 (README §0 유일 명문 예외 — CTA 한정) -->
  <g id="follow-card">
    <rect x="90" y="800" width="900" height="154" rx="77" fill="#ffffff" filter="url(#cardShadow)"/>

    <!-- 프로필 아바타 (카테고리 색 링 + 주제 심볼) -->
    <circle cx="178" cy="877" r="60" fill="#0d3b34" stroke="#00796b" stroke-width="5"/>
    <g fill="#80cbc4">
      <path d="M178 838 L205 880 L151 880 Z"/>
      <path d="M178 858 L212 901 L144 901 Z"/>
      <rect x="170" y="898" width="16" height="15"/>
    </g>

    <!-- 핸들 (상수) -->
    <text x="262" y="895" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="700" fill="#16302c">@travelkorea_365</text>

    <!-- 팔로우 버튼 (카테고리 메인색) -->
    <rect x="730" y="833" width="178" height="88" rx="22" fill="#00796b"/>
    <text x="819" y="892" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="700" fill="#ffffff">팔로우</text>

    <!-- 클릭 커서 -->
    <g transform="translate(886 882)">
      <path d="M0 0 L0 40 L11 31 L18 47 L25 44 L18 28 L31 28 Z" fill="#ffffff" stroke="#16302c" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- 서브 카피 -->
  <text x="540" y="1024" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="600" fill="#80cbc4">— ⟪SUB_COPY⟫ —</text>

  <!-- info-chip (원고 위치/접근 사실 — 없으면 이 g 통째 삭제) -->
  <g id="info-chip">
    <rect x="80" y="1070" width="620" height="70" rx="35" fill="#ffffff" fill-opacity="0.14" stroke="#00796b" stroke-width="2"/>
    <text x="110" y="1115" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="600" fill="#ffffff">⟪INFO_CHIP⟫</text>
  </g>

  <text x="80" y="1198" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="600" fill="#80cbc4">⟪BLOG_LINE⟫</text>

  <text x="80" y="1262" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="500" fill="#9e9e9e">⟪HASHTAGS⟫</text>
</svg>
