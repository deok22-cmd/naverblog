<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_04 : POINT (F — 텍스트 3포인트 리스트) — local_no_parking_fee_spots =====
       카테고리: 로컬/생활정보  팔레트: medium=#388e3c / dark=#2e7d32 / light=#e8f5e9
       소스: h2② 한강공원 — 인기지구(유료) / 외곽지구(저렴·일부무료) / 따릉이(무료)
       BG 슬롯만 교체. -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.64"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <!-- 제목 -->
  <text x="80" y="250" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">한강공원 주차</text>
  <rect x="82" y="284" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 아이템 1 -->
    <rect x="80" y="452" width="34" height="8" fill="#81c784"/>
    <text x="80" y="520" font-size="46" font-weight="700" fill="#ffffff">뚝섬·반포·여의도</text>
    <text x="80" y="574" font-size="30" font-weight="500" fill="#a5d6a7">인기 지구 — 대부분 유료, 대중교통 권장</text>
    <line x1="80" y1="636" x2="1000" y2="636" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 아이템 2 -->
    <rect x="80" y="700" width="34" height="8" fill="#81c784"/>
    <text x="80" y="768" font-size="46" font-weight="700" fill="#ffffff">난지·강서·암사</text>
    <text x="80" y="822" font-size="30" font-weight="500" fill="#a5d6a7">외곽 지구 — 상대적으로 저렴, 일부 시간 무료</text>
    <line x1="80" y1="884" x2="1000" y2="884" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <!-- 아이템 3 -->
    <rect x="80" y="948" width="34" height="8" fill="#81c784"/>
    <text x="80" y="1016" font-size="46" font-weight="700" fill="#ffffff">따릉이·자전거</text>
    <text x="80" y="1070" font-size="30" font-weight="500" fill="#a5d6a7">자전거 거치대 무료 — 주차비 0원 해법</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#cfd8dc">지구별 요금은 한강사업본부 앱 사전 조회.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#2e7d32"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
