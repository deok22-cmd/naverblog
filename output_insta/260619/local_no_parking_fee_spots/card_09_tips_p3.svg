<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== card_09 : TIPS (P3 — 체크리스트) — local_no_parking_fee_spots =====
       카테고리: 로컬/생활정보  팔레트: medium=#388e3c / dark=#2e7d32 / light=#e8f5e9
       소스: h2⑥ 주말 주차 실전 팁 4항목
       BG 슬롯만 교체. -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#388e3c"/>

  <!-- 제목 -->
  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="60" font-weight="800" fill="#ffffff">주차 성공 실전 체크</text>
  <rect x="82" y="304" width="140" height="9" fill="#388e3c"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <!-- 항목 1 -->
    <rect x="80" y="430" width="34" height="8" fill="#81c784"/>
    <text x="80" y="500" font-size="42" font-weight="600" fill="#ffffff">오전 9시 이전 출발하기</text>
    <line x1="80" y1="560" x2="1000" y2="560" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
    <!-- 항목 2 -->
    <rect x="80" y="610" width="34" height="8" fill="#81c784"/>
    <text x="80" y="680" font-size="42" font-weight="600" fill="#ffffff">내비 앱 실시간 주차 확인</text>
    <line x1="80" y1="740" x2="1000" y2="740" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
    <!-- 항목 3 -->
    <rect x="80" y="790" width="34" height="8" fill="#81c784"/>
    <text x="80" y="860" font-size="42" font-weight="600" fill="#ffffff">이면도로 공영주차장 미리 검색</text>
    <line x1="80" y1="920" x2="1000" y2="920" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
    <!-- 항목 4 -->
    <rect x="80" y="970" width="34" height="8" fill="#81c784"/>
    <text x="80" y="1040" font-size="42" font-weight="600" fill="#ffffff">주차 앱 사전 예약 (아이파킹·파킹박)</text>
  </g>

  <text x="80" y="1150" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="800" fill="#81c784">저장해두고 나들이 전날 체크  ↓</text>
  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#a5d6a7">전체 정보는 프로필 블로그에서 확인.</text>

  <!-- ===== 브랜드 워터마크 ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#2e7d32"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
