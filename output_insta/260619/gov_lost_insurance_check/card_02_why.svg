<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== C : 측면 텍스트 · why (왜 숨은 보험금이 생기나) · 생활정보 팔레트 ===== -->
  <defs>
    <linearGradient id="scrimLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.74"/>
      <stop offset="0.52" stop-color="#000000" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#1a0e00"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimLeft)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#f57c00"/>

  <text x="80" y="430" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="28" font-weight="700" fill="#ffb74d" letter-spacing="3">왜 생기나</text>

  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="540">보험금이</tspan>
    <tspan x="80" y="630">잠자는 이유</tspan>
  </text>

  <rect x="82" y="688" width="120" height="8" fill="#f57c00"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="500" fill="#fff3e0">
    <text x="80" y="790">만기 안내를 못 받아 청구를 잊거나,</text>
    <text x="80" y="848">어릴 적 부모님이 든 보험을 모르거나,</text>
    <text x="80" y="906">사망한 가족의 보험금을 유족이</text>
    <text x="80" y="964">청구하지 않은 경우가 대표적입니다.</text>
  </g>

  <text x="80" y="1080" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="600" fill="#ffb74d">금감원 기준 · 매년 수천억 원 규모 미청구</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#e65100"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
