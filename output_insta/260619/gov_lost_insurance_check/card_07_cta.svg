<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== G9 CTA 표준 : 팔로우 유도(흰 팔로우 카드) · gov_lost_insurance_check · 생활정보 팔레트 =====
       README §0 "불투명 패널 전면 금지"의 유일한 명문 예외 = 아래 #follow-card 흰 카드 1개.
       CTA 외 카드엔 적용 금지. 색: 생활정보 #f57c00/#e65100/#ffb74d 기준.
       헤드라인 slug별 변형 (gov_lost_insurance_check: 숨은 돈 찾기 앵글) -->
  <defs>
    <linearGradient id="scrimAll" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#1a0e00"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimAll)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#f57c00"/>

  <!-- 북마크 아이콘 (저장 유도 보강) -->
  <path id="bookmark" d="M912 84 h78 a10 10 0 0 1 10 10 v150 l-49 -33 -49 33 v-150 a10 10 0 0 1 10 -10 z" fill="#f57c00"/>

  <!-- 상단 브랜드 워드마크 (핸들 상수) -->
  <text x="540" y="152" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="36" font-weight="800" fill="#ffffff" letter-spacing="4">travelkorea_365</text>

  <!-- 헤드라인 (slug별 변형: 숨은 보험금 찾기 앵글) -->
  <g id="cta-title">
    <text x="540" y="566" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="48" font-weight="600" fill="#ffb74d" letter-spacing="2">몰랐던 내 돈이 기다리고 있다</text>
    <text x="540" y="664" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">숨은 보험금,</text>
    <text x="540" y="754" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">지금 찾아가세요</text>
  </g>

  <!-- 흰색 팔로우 카드 (README §0 유일 명문 예외 — CTA 한정) -->
  <g id="follow-card">
    <rect x="90" y="800" width="900" height="154" rx="77" fill="#ffffff" filter="url(#cardShadow)"/>

    <!-- 프로필 아바타 (카테고리 색 링 + 주제 심볼) -->
    <circle cx="178" cy="877" r="60" fill="#3d1500" stroke="#f57c00" stroke-width="5"/>
    <g fill="#ffb74d">
      <path d="M178 838 L205 880 L151 880 Z"/>
      <path d="M178 858 L212 901 L144 901 Z"/>
      <rect x="170" y="898" width="16" height="15"/>
    </g>

    <!-- 핸들 (상수) -->
    <text x="262" y="895" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="700" fill="#16302c">@travelkorea_365</text>

    <!-- 팔로우 버튼 (카테고리 메인색) -->
    <rect x="730" y="833" width="178" height="88" rx="22" fill="#f57c00"/>
    <text x="819" y="892" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="40" font-weight="700" fill="#ffffff">팔로우</text>

    <!-- 클릭 커서 -->
    <g transform="translate(886 882)">
      <path d="M0 0 L0 40 L11 31 L18 47 L25 44 L18 28 L31 28 Z" fill="#ffffff" stroke="#16302c" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- 서브 카피 -->
  <text x="540" y="1024" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="600" fill="#ffb74d">— 생활 속 숨은 돈 정보 받아보기 —</text>

  <!-- info-chip (원고 접근 사실) -->
  <g id="info-chip">
    <rect x="80" y="1070" width="620" height="70" rx="35" fill="#ffffff" fill-opacity="0.14" stroke="#f57c00" stroke-width="2"/>
    <text x="110" y="1115" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="600" fill="#ffffff">cont.insure.or.kr · 무료 · 본인인증만</text>
  </g>

  <text x="80" y="1198" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="34" font-weight="600" fill="#ffb74d">블로그에서 단계별 조회 방법 전문 확인</text>

  <text x="80" y="1262" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="500" fill="#9e9e9e">#숨은보험금 #내보험찾아줌 #보험금조회 #휴면보험금 #만기보험금</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#e65100"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
