<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== A : 헤드라인-하단 · point_2 (조회 주의사항) · 생활정보 팔레트 ===== -->
  <defs>
    <linearGradient id="scrimBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.40" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.82"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#1a0e00"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#f57c00"/>

  <rect x="80" y="806" width="64" height="10" fill="#f57c00"/>
  <text x="80" y="930" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-2">이것만은</text>
  <text x="80" y="1028" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="88" font-weight="800" fill="#ffffff" letter-spacing="-2">주의하세요</text>

  <g id="chips">
    <rect x="80" y="1074" width="296" height="68" rx="34" fill="#f57c00"/>
    <text x="228" y="1118" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">공식 주소 확인</text>
    <rect x="394" y="1074" width="272" height="68" rx="34" fill="#f57c00"/>
    <text x="530" y="1118" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">본인 직접 조회</text>
    <rect x="684" y="1074" width="272" height="68" rx="34" fill="#f57c00"/>
    <text x="820" y="1118" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="700" fill="#ffffff" text-anchor="middle">상속인 별도 절차</text>
  </g>

  <text x="80" y="1218" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#fff3e0">유사 사이트 주의 · 대리 조회 시 개인정보 유출 위험</text>
  <text x="80" y="1270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#fff3e0">상속인 문의: 생명보험협회 02-2262-6600</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#e65100"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
