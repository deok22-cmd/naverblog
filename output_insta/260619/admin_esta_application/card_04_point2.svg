  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimBottom)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#283593"/>

  <rect x="80" y="852" width="64" height="10" fill="#283593"/>
  <text font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="90" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="80" y="960">결과는 셋 중 하나</tspan>
  </text>

  <g id="chips">
    <rect x="80" y="1010" width="224" height="68" rx="34" fill="#283593"/>
    <text x="192" y="1054" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">허가(Approved)</text>
    <rect x="322" y="1010" width="224" height="68" rx="34" fill="#283593"/>
    <text x="434" y="1054" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">보류(Pending)</text>
    <rect x="564" y="1010" width="200" height="68" rx="34" fill="#283593"/>
    <text x="664" y="1054" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">거부(Denied)</text>
  </g>

  <text x="80" y="1158" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e8eaf6">보류는 72시간 이내 최종 결과 확인 필수.</text>
  <text x="80" y="1208" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="38" font-weight="500" fill="#e8eaf6">거부 시에는 주한 미국 대사관에서 비자 신청.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
