<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- ===== F : 텍스트 리스트 — POINT3 : 인기 강좌 3분야 =====
       카테고리: 생활·정보 / 팔레트: main=#00796b dark=#004d40 light=#e0f2f1 -->
  <defs>
