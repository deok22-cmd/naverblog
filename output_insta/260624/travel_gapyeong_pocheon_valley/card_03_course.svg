<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_03 : course — P2 레이아웃 (교통 접근 동선)
       소스: h2 ⑥ 대중교통으로 가는 법 비교
       카테고리: 국내여행 | 팔레트: #00796b / #004d40 / #e0f2f1 / #80cbc4 / #b2dfdb -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="270" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">교통 접근법 비교</text>
  <rect x="82" y="304" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="442" font-size="42" font-weight="700" fill="#ffffff">용추계곡 — 대중교통</text>
    <text x="80" y="488" font-size="28" font-weight="500" fill="#b2dfdb">청량리 ITX-청춘 → 가평역 → 택시 10~15분</text>
    <text x="1000" y="458" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">약 40분</text>
    <line x1="80" y1="540" x2="1000" y2="540" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="612" font-size="42" font-weight="700" fill="#ffffff">용추계곡 — 자가용</text>
    <text x="80" y="658" font-size="28" font-weight="500" fill="#b2dfdb">서울 출발 · 경춘고속도로 이용</text>
    <text x="1000" y="628" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">1~1.5시간</text>
    <line x1="80" y1="710" x2="1000" y2="710" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="782" font-size="42" font-weight="700" fill="#ffffff">백운계곡 — 대중교통</text>
    <text x="80" y="828" font-size="28" font-weight="500" fill="#b2dfdb">동서울터미널 또는 의정부역 → 포천·이동 버스</text>
    <text x="1000" y="798" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">다소 불편</text>
    <line x1="80" y1="880" x2="1000" y2="880" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="952" font-size="42" font-weight="700" fill="#ffffff">백운계곡 — 자가용</text>
    <text x="80" y="998" font-size="28" font-weight="500" fill="#b2dfdb">서울 도심 출발 · 43번 국도 이용</text>
    <text x="1000" y="968" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">1.5~2시간</text>
    <line x1="80" y1="1050" x2="1000" y2="1050" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>

    <text x="80" y="1122" font-size="42" font-weight="700" fill="#ffffff">주말 출발 권장 시각</text>
    <text x="1000" y="1122" font-size="36" font-weight="800" fill="#80cbc4" text-anchor="end">오전 6~7시 이전</text>
  </g>

  <text x="80" y="1240" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">귀경길은 오후 3~4시 이전 출발 권장.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
