<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- card_05 : info — P1 레이아웃 (정보 표)
       소스: h2 ⑧ 두 계곡 비교 요약 표 (6행)
       카테고리: 국내여행 | 팔레트: #00796b / #004d40 / #e0f2f1 / #80cbc4 / #b2dfdb -->
  <defs>
    <linearGradient id="scrimFull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.66"/>
    </linearGradient>
  </defs>

  <!-- ▼▼▼ Figma/Phase B: 이 사각형 1개만 배경 이미지로 치환 ▼▼▼ -->
  <rect id="BG__REPLACE_WITH_IMAGE" x="0" y="0" width="1080" height="1350" fill="#16201e"/>
  <!-- ▲▲▲ 배경 슬롯 ▲▲▲ -->

  <rect x="0" y="0" width="1080" height="1350" fill="url(#scrimFull)"/>
  <rect id="brand-bar" x="0" y="0" width="14" height="1350" fill="#00796b"/>

  <text x="80" y="200" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="48" font-weight="700" fill="#80cbc4" letter-spacing="2">용추 vs 백운</text>
  <text x="80" y="284" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="62" font-weight="800" fill="#ffffff">한눈에 비교</text>
  <rect x="82" y="318" width="140" height="9" fill="#00796b"/>

  <g font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
    <text x="80" y="440" font-size="36" font-weight="600" fill="#b2dfdb">분위기</text>
    <text x="1000" y="440" font-size="38" font-weight="800" fill="#ffffff" text-anchor="end">가족친화 vs 암반협곡</text>
    <line x1="80" y1="476" x2="1000" y2="476" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="556" font-size="36" font-weight="600" fill="#b2dfdb">입장료</text>
    <text x="1000" y="556" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">약 2,000원 vs 대부분 무료</text>
    <line x1="80" y1="592" x2="1000" y2="592" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="672" font-size="36" font-weight="600" fill="#b2dfdb">주차 요금</text>
    <text x="1000" y="672" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">3,000~5,000원 (공통)</text>
    <line x1="80" y1="708" x2="1000" y2="708" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="788" font-size="36" font-weight="600" fill="#b2dfdb">서울 접근</text>
    <text x="1000" y="788" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">1~1.5h vs 1.5~2h</text>
    <line x1="80" y1="824" x2="1000" y2="824" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="904" font-size="36" font-weight="600" fill="#b2dfdb">추천 대상</text>
    <text x="1000" y="904" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">유아·가족 vs 청년·트레킹</text>
    <line x1="80" y1="940" x2="1000" y2="940" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>

    <text x="80" y="1020" font-size="36" font-weight="600" fill="#b2dfdb">운영 기간</text>
    <text x="1000" y="1020" font-size="38" font-weight="800" fill="#80cbc4" text-anchor="end">6월 말 ~ 8월 말 (공통)</text>
  </g>

  <text x="80" y="1130" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="500" fill="#b2dfdb">2026년 기준 · 성수기 요금은 변동 가능, 방문 전 재확인.</text>

  <!-- ===== 브랜드 워터마크 (우측 하단 고정 · 문서상 마지막 = 항상 최상단) ===== -->
  <g id="brand-watermark">
    <path d="M822 1251 H1080 V1350 H792 V1281 A30 30 0 0 1 822 1251 Z" fill="#004d40"/>
    <text x="936" y="1310" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0.5">travelkorea_365</text>
  </g>
</svg>
